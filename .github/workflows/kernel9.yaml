# .github/workflows/build_kernel.yaml
name: Build Kernel & Modules (Stripped & Compressed) for Realme C21Y

on:
  workflow_dispatch:

env:
  ARCH: arm64 # Keep top-level ARCH for clarity, will be re-exported below
  MODULES_STAGING_PATH: ${{ github.workspace }}/modules_staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📜 Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel_source

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            lsb-release make python3 rsync wget zip unzip \
            libyaml-dev pkg-config

      - name: 📥 Download Clang Toolchain (crDroid r353983c / Clang 11.0.2)
        run: |
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH
          clang --version

      # <<< NEW STEP START >>>
      - name: 📥 Download GCC Toolchains (AArch64 & ARM)
        run: |
          echo "Cloning aarch64 GCC..."
          git clone --depth=1 https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 -b lineage-19.1 gcc-aarch64
          echo "${{ github.workspace }}/gcc-aarch64/bin" >> $GITHUB_PATH
          echo "Cloning arm GCC..."
          git clone --depth=1 https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 -b lineage-19.1 gcc-arm
          echo "${{ github.workspace }}/gcc-arm/bin" >> $GITHUB_PATH
          echo "GCC Toolchains added to PATH."
          # Verify (optional)
          ls -l ${{ github.workspace }}/gcc-aarch64/bin/aarch64-linux-android-gcc
          ls -l ${{ github.workspace }}/gcc-arm/bin/arm-linux-androideabi-gcc
      # <<< NEW STEP END >>>

      - name: 🚀 Build Kernel + Modules & Install
        working-directory: kernel_source
        run: |
          #─── Basic env (Updated) ───────────────────────────────────────────────
          export ARCH="arm64" # Explicitly set ARCH here
          export CROSS_COMPILE="aarch64-linux-android-" # Updated
          export CROSS_COMPILE_ARM32="arm-linux-androideabi-" # Added
          export KBUILD_BUILD_USER="GitHubActions"
          export KBUILD_BUILD_HOST="github.com"

          #─── Force LLVM for *everything* (Updated) ─────────────────────────────
          export PATH=${{ github.workspace }}/clang/bin:${{ github.workspace }}/gcc-aarch64/bin:${{ github.workspace }}/gcc-arm/bin:$PATH # Ensure Clang is first if needed, though explicit CC overrides PATH lookup for compiler
          export CC="clang" # Already set
          export CXX=clang++ # Already set
          export LD="ld.lld" # Already set
          export HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld # Already set
          export AR="llvm-ar" HOSTAR=llvm-ar # Already set
          export NM="llvm-nm" HOSTNM=llvm-nm # Already set
          export OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" # Already set
          export READELF="llvm-readelf" STRIP="llvm-strip" # Already set
          export OBJSIZE="llvm-size" # Added previously
          export LLVM_AR="llvm-ar" LLVM_NM="llvm-nm" # Use consistent naming if Kbuild prefers LLVM_NM
          export LLVM_DIS="llvm-dis" # Added previously
          export CLANG_TRIPLE="aarch64-linux-android-" # Added
          export LLVM=1 LLVM_IAS=1 # Already set

          # Note: LDGOLD might not be necessary or used when LD=ld.lld, but updating prefix for consistency
          export LDGOLD="aarch64-linux-android-ld.gold" # Updated prefix

          #─── YAML libs for dtc ──────────────────────────────────────────────────
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}
          YAML_LIBS=$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml -L/usr/lib/x86_64-linux-gnu")
          export HOST_LDFLAGS="$YAML_LIBS"

          #─── Custom BSP Flags ───────────────────────────────────────────────────
          export BSP_BUILD_ANDROID_OS="y" # Added previously
          export BSP_BUILD_FAMILY="qogirl6" # Added previously

          #─── Prepare output & config ───────────────────────────────────────────
          mkdir -p out
          # Ensure stock_kernel.config exists in kernel_source directory
          if [ ! -f stock_kernel.config ]; then
            echo "❌ Error: stock_kernel.config not found in kernel_source directory."
            exit 1
          fi
          cp stock_kernel.config out/.config

          # Pass relevant variables directly to make (preferred over exporting everything if possible)
          MAKE_ARGS="O=out \
                     ARCH=${ARCH} \
                     CROSS_COMPILE=${CROSS_COMPILE} \
                     CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
                     CC=${CC} CXX=${CXX} LD=${LD} \
                     HOSTCC=${HOSTCC} HOSTCXX=${HOSTCXX} HOSTLD=${HOSTLD} \
                     AR=${AR} HOSTAR=${HOSTAR} NM=${NM} HOSTNM=${HOSTNM} \
                     OBJCOPY=${OBJCOPY} OBJDUMP=${OBJDUMP} READELF=${READELF} STRIP=${STRIP} \
                     OBJSIZE=${OBJSIZE} LLVM_AR=${LLVM_AR} LLVM_NM=${LLVM_NM} LLVM_DIS=${LLVM_DIS} \
                     CLANG_TRIPLE=${CLANG_TRIPLE} \
                     LLVM=1 LLVM_IAS=1 \
                     HOSTLDFLAGS=\"${HOST_LDFLAGS}\" \
                     KBUILD_BUILD_USER=\"${KBUILD_BUILD_USER}\" KBUILD_BUILD_HOST=\"${KBUILD_BUILD_HOST}\" \
                     BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY}"

          make $MAKE_ARGS olddefconfig

          #─── Build kernel + DTBs + Modules ───────────────────────────────────
          echo "::group::Build Kernel, DTBs, and Modules"
          make -j$(nproc) $MAKE_ARGS V=1 \
               STOP_SHIP_TRACEPRINTK=1 \
               Image.gz dtbs modules
          echo "::endgroup::"

          #─── Install Modules, Run depmod, Strip Modules ───────────────────────
          echo "::group::Install, Depmod, Strip Modules"
          # Clean previous staging area
          rm -rf "${{ env.MODULES_STAGING_PATH }}"
          mkdir -p "${{ env.MODULES_STAGING_PATH }}"
          # Install modules
          make $MAKE_ARGS \
               INSTALL_MOD_PATH="${{ env.MODULES_STAGING_PATH }}" \
               modules_install
          # Find kernel version string
          KVER=$(ls "${{ env.MODULES_STAGING_PATH }}/lib/modules/" 2>/dev/null || echo "")
          if [ -z "$KVER" ]; then
            echo "⚠️ Warning: Kernel version directory not found. Skipping depmod and strip."
          elif [ ! -d "${{ env.MODULES_STAGING_PATH }}/lib/modules/$KVER/kernel" ]; then
            echo "⚠️ Warning: No kernel modules found for $KVER. Skipping depmod and strip."
          else
            MODULES_DIR="${{ env.MODULES_STAGING_PATH }}/lib/modules/$KVER"
            echo "Found kernel version: $KVER"
            # Generate modules.dep etc.
            echo "Running depmod..."
            # Use depmod from kmod package
            depmod -a -b "${{ env.MODULES_STAGING_PATH }}" "$KVER"
            echo "depmod finished."
            # Strip modules
            echo "Stripping modules..."
            # Use llvm-strip since we forced LLVM toolchain
            find "$MODULES_DIR" -name '*.ko' -exec ${STRIP} --strip-unneeded {} +
            echo "Stripping finished."
          fi
          echo "::endgroup::"

          #─── Verify build success (Image.gz only) ─────────────────────────────
          if [ ! -f out/arch/${ARCH}/boot/Image.gz ]; then
            echo "❌ Build failed: out/arch/${ARCH}/boot/Image.gz not found."
            exit 1
          fi
          echo "✅ Kernel build and module processing successful!"

      - name: 📦 Prepare Artifact (Compress Modules)
        run: |
          ARTIFACT_DIR="$GITHUB_WORKSPACE/artifact"
          mkdir -p "$ARTIFACT_DIR"

          # Copy Kernel Image
          cp kernel_source/out/arch/${ARCH}/boot/Image.gz "$ARTIFACT_DIR/"

          # Copy DTBs
          find kernel_source/out/arch/${ARCH}/boot/dts/ -name '*.dtb' -exec cp {} "$ARTIFACT_DIR/" \;

          # Create compressed tarball of modules (if they exist)
          MODULES_BASE_DIR="${{ env.MODULES_STAGING_PATH }}/lib/modules"
          if [ -d "$MODULES_BASE_DIR" ] && [ "$(ls -A $MODULES_BASE_DIR)" ]; then
            KVER=$(ls "$MODULES_BASE_DIR")
            MODULES_INSTALL_DIR="$MODULES_BASE_DIR/$KVER"

            if [ -d "$MODULES_INSTALL_DIR/kernel" ]; then
              echo "Modules found for kernel $KVER, creating compressed tarball artifact/modules-$KVER.tar.gz"
              tar czf "$ARTIFACT_DIR/modules-$KVER.tar.gz" -C "$MODULES_INSTALL_DIR" .
            else
              echo "No actual kernel modules (.ko files) found in $MODULES_INSTALL_DIR, skipping module packaging."
            fi
          else
            echo "No kernel module directories found in staging path: $MODULES_BASE_DIR."
          fi

      - name: 📤 Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-${{ github.run_id }}
          path: ${{ github.workspace }}/artifact/*
          if-no-files-found: error
