name: Build Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OBJ_DIR: ${{ github.workspace }}/out
      CONFIG: rmx3261_defconfig
      ARCH: arm64

      # Clang
      CLANG_REPO:  https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524.git
      CLANG_BRANCH: "10.0"
      CC: clang
      CLANG_TRIPLE: aarch64-linux-gnu-

      # GCC prebuilts (These are present, but the goal is to ensure they are not used for the kernel itself if using LLVM=1)
      GCC_BRANCH:     "lineage-19.1"
      GCC_AARCH64_REPO: https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9
      GCC_ARM_REPO:     https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9

      # Cross-compilers (Kbuild uses these to find the toolchain binaries if not overridden by CC, LD etc.)
      CROSS_COMPILE:        aarch64-linux-android-
      CROSS_COMPILE_ARM32:  arm-linux-androideabi-

      # LLVM tools (These explicitly tell Kbuild which LLVM tools to use for the TARGET)
      LD:        ld.lld
      AR:        llvm-ar
      NM:        llvm-nm
      OBJCOPY:   llvm-objcopy
      OBJDUMP:   llvm-objdump
      READELF:   llvm-readelf
      OBJSIZE:   llvm-size
      STRIP:     llvm-strip
      LDGOLD:    aarch64-linux-gnu-ld.gold # May or may not be used with LLVM=1, LD=ld.lld
      LLVM_AR:   llvm-ar
      LLVM_DIS:  llvm-dis

      # Build flags
      ENABLE_CCACHE:     true
      BSP_BUILD_ANDROID_OS: 'y'
      BSP_BUILD_FAMILY: 'qogirl6'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps + ccache
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc build-essential libncurses-dev git curl ccache \
            libyaml-dev pkg-config

      - name: Clone Clang toolchain
        run: |
          set -e
          git clone --depth=1 --branch ${CLANG_BRANCH} ${CLANG_REPO} clang
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH

      - name: Clone GCC aarch64 toolchain
        run: |
          set -e
          git clone --depth=1 --branch ${GCC_BRANCH} ${GCC_AARCH64_REPO} gcc-aarch64
          echo "${{ github.workspace }}/gcc-aarch64/bin" >> $GITHUB_PATH

      - name: Clone GCC arm toolchain
        run: |
          set -e
          git clone --depth=1 --branch ${GCC_BRANCH} ${GCC_ARM_REPO} gcc-arm
          echo "${{ github.workspace }}/gcc-arm/bin" >> $GITHUB_PATH

      - name: Generate defconfig
        run: |
          set -e
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}"
          YAML_HOST_LIBS="$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml")"
          export CURRENT_HOST_LDFLAGS="${HOST_LDFLAGS:-} ${YAML_HOST_LIBS}"

          make -s O=${OBJ_DIR} ARCH=${ARCH} ${CONFIG} \
            HOSTLDFLAGS="${CURRENT_HOST_LDFLAGS}" \
            -j$(nproc)

      - name: Compile kernel
        run: |
          set -e
          if [ "${ENABLE_CCACHE}" = "true" ]; then
            export CC_FOR_MAKE="ccache ${CC}"
          else
            export CC_FOR_MAKE="${CC}"
          fi

          export HOSTCC=clang
          export HOSTLD=ld.lld
          # export HOSTAR=llvm-ar # Optionally, if host tools need it

          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}"
          YAML_HOST_CFLAGS="$(pkg-config --cflags yaml-0.1 2>/dev/null || echo '')"
          YAML_HOST_LIBS="$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml")"

          export CURRENT_HOST_CFLAGS="${HOSTCFLAGS:-} ${YAML_HOST_CFLAGS}"
          export CURRENT_HOST_LDFLAGS="${HOST_LDFLAGS:-} ${YAML_HOST_LIBS}"

          make O=${OBJ_DIR} ARCH=${ARCH} \
            LLVM=1 \
            LLVM_IAS=1 \
            BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} \
            BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY} \
            CC="${CC_FOR_MAKE}" \
            CLANG_TRIPLE=${CLANG_TRIPLE} \
            CROSS_COMPILE=${CROSS_COMPILE} \
            CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
            LD=${LD} \
            AR=${AR} \
            NM=${NM} \
            OBJCOPY=${OBJCOPY} \
            OBJDUMP=${OBJDUMP} \
            READELF=${READELF} \
            OBJSIZE=${OBJSIZE} \
            STRIP=${STRIP} \
            LDGOLD=${LDGOLD} \
            LLVM_AR=${LLVM_AR} \
            LLVM_DIS=${LLVM_DIS} \
            HOSTCC="${HOSTCC}" \
            HOSTLD="${HOSTLD}" \
            HOSTCFLAGS="${CURRENT_HOST_CFLAGS}" \
            HOSTLDFLAGS="${CURRENT_HOST_LDFLAGS}" \
            V=1 \
            -j$(nproc)

      - name: Prepare Artifacts
        id: prepare_artifacts # Changed ID for clarity
        run: |
          set -e
          # Initialize outputs to empty strings
          echo "main_kernel_image_path=" >> $GITHUB_OUTPUT
          echo "main_kernel_image_name=" >> $GITHUB_OUTPUT
          echo "image_gz_path_output=" >> $GITHUB_OUTPUT
          echo "dtbo_img_path_output=" >> $GITHUB_OUTPUT
          echo "dtb_collection_dir_path_output=" >> $GITHUB_OUTPUT

          # --- 1. Main Kernel Image (Image or Image.gz) ---
          MAIN_KERNEL_IMAGE_PATH=""
          MAIN_KERNEL_IMAGE_NAME=""
          if [ -f "${OBJ_DIR}/arch/${ARCH}/boot/Image" ]; then
            echo "✅ Main kernel image found: Image"
            MAIN_KERNEL_IMAGE_PATH="${OBJ_DIR}/arch/${ARCH}/boot/Image"
            MAIN_KERNEL_IMAGE_NAME="Image"
          elif [ -f "${OBJ_DIR}/arch/${ARCH}/boot/Image.gz" ]; then
            echo "✅ Main kernel image found: Image.gz"
            MAIN_KERNEL_IMAGE_PATH="${OBJ_DIR}/arch/${ARCH}/boot/Image.gz"
            MAIN_KERNEL_IMAGE_NAME="Image.gz"
          else
            echo "❌ Build failed: Kernel Image or Image.gz not found in ${OBJ_DIR}/arch/${ARCH}/boot/" >&2
            ls -lR "${OBJ_DIR}/arch/${ARCH}/boot/" # List output directory for debugging
            exit 1
          fi
          echo "main_kernel_image_path=${MAIN_KERNEL_IMAGE_PATH}" >> $GITHUB_OUTPUT
          echo "main_kernel_image_name=${MAIN_KERNEL_IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "Main kernel image: ${MAIN_KERNEL_IMAGE_PATH}"

          # --- 2. Image.gz (always try to find and output path if exists) ---
          IMAGE_GZ_SPECIFIC_PATH="${OBJ_DIR}/arch/${ARCH}/boot/Image.gz"
          if [ -f "${IMAGE_GZ_SPECIFIC_PATH}" ]; then
            echo "✅ Image.gz found: ${IMAGE_GZ_SPECIFIC_PATH}"
            echo "image_gz_path_output=${IMAGE_GZ_SPECIFIC_PATH}" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ Image.gz not found at ${IMAGE_GZ_SPECIFIC_PATH} (this is okay if kernel built as uncompressed Image)."
          fi

          # --- 3. dtbo.img ---
          DTBO_IMG_PATH="${OBJ_DIR}/arch/${ARCH}/boot/dtbo.img"
          if [ -f "${DTBO_IMG_PATH}" ]; then
            echo "✅ dtbo.img found: ${DTBO_IMG_PATH}"
            echo "dtbo_img_path_output=${DTBO_IMG_PATH}" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ dtbo.img not found. Enable CONFIG_OF_OVERLAY and select overlays in defconfig if needed."
          fi

          # --- 4. .dtb files ---
          DTB_COLLECTION_DIR="${OBJ_DIR}/dtbs_artifact_collection" # Temporary staging directory for dtbs
          mkdir -p "${DTB_COLLECTION_DIR}"
          dtbs_found_in_collection=false

          # Search in arch/$ARCH/boot/dts/ (recursive)
          DTS_SUBDIR="${OBJ_DIR}/arch/${ARCH}/boot/dts"
          if [ -d "$DTS_SUBDIR" ]; then
            find "$DTS_SUBDIR" -name "*.dtb" -type f -exec cp -t "${DTB_COLLECTION_DIR}" {} +
            if [ -n "$(ls -A "${DTB_COLLECTION_DIR}" 2>/dev/null)" ]; then
              dtbs_found_in_collection=true
            fi
          fi

          # Search in arch/$ARCH/boot/ (non-recursive, top-level only)
          # This will add to the collection dir if files are found
          find "${OBJ_DIR}/arch/${ARCH}/boot/" -maxdepth 1 -name "*.dtb" -type f -exec cp -t "${DTB_COLLECTION_DIR}" {} +
          if [ -n "$(ls -A "${DTB_COLLECTION_DIR}" 2>/dev/null)" ]; then # Re-check after second find
             dtbs_found_in_collection=true
          fi

          if [ "$dtbs_found_in_collection" = true ]; then
            echo "✅ .dtb files collected into ${DTB_COLLECTION_DIR}"
            echo "dtb_collection_dir_path_output=${DTB_COLLECTION_DIR}" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ No .dtb files found in common locations."
            # rm -rf "${DTB_COLLECTION_DIR}" # Clean up empty staging dir - upload action handles empty path better if output is empty
          fi
          echo "--- Artifacts Prepared ---"
          ls -lh "${OBJ_DIR}/arch/${ARCH}/boot/"
          if [ -d "${DTB_COLLECTION_DIR}" ]; then
            ls -lh "${DTB_COLLECTION_DIR}/"
          fi

      - name: Upload Main Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ steps.prepare_artifacts.outputs.main_kernel_image_name }}-${{ github.run_id }}
          path: ${{ steps.prepare_artifacts.outputs.main_kernel_image_path }}
          if-no-files-found: error

      - name: Upload Image.gz
        if: steps.prepare_artifacts.outputs.image_gz_path_output != ''
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image.gz-${{ github.run_id }}
          path: ${{ steps.prepare_artifacts.outputs.image_gz_path_output }}
          if-no-files-found: warn # Should not happen due to the 'if' condition, but good practice

      - name: Upload dtbo.img
        if: steps.prepare_artifacts.outputs.dtbo_img_path_output != ''
        uses: actions/upload-artifact@v4
        with:
          name: kernel-dtbo.img-${{ github.run_id }}
          path: ${{ steps.prepare_artifacts.outputs.dtbo_img_path_output }}
          if-no-files-found: warn

      - name: Upload DTB files
        if: steps.prepare_artifacts.outputs.dtb_collection_dir_path_output != ''
        uses: actions/upload-artifact@v4
        with:
          name: kernel-dtbs-${{ github.run_id }}
          path: ${{ steps.prepare_artifacts.outputs.dtb_collection_dir_path_output }}/ # Upload directory contents
          if-no-files-found: warn
