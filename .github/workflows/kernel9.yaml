# .github/workflows/build_kernel.yaml
name: Build Kernel & Modules (Stripped & Compressed) for Realme C21Y

on:
  workflow_dispatch: # Allows manual triggering

env:
  # Define ARCH globally for reference, but it will be explicitly set in the build step
  ARCH: arm64
  # Define the staging path for modules globally for easy access
  MODULES_STAGING_PATH: ${{ github.workspace }}/modules_staging

jobs:
  build:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner

    steps:
      - name: 📜 Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel_source # Checkout source code into kernel_source directory

      - name: 🔧 Install Dependencies
        run: |
          echo "Updating package lists..."
          sudo apt-get update
          echo "Installing build dependencies..."
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            lsb-release make python3 rsync wget zip unzip \
            libyaml-dev pkg-config # libyaml-dev needed for dtc with YAML support
          echo "Dependencies installed."

      - name: 📥 Download Clang Toolchain (crDroid r353983c / Clang 11.0.2)
        run: |
          echo "Cloning Clang toolchain..."
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang
          # Add Clang bin directory to the GitHub Actions PATH for subsequent steps
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH
          echo "Clang toolchain cloned and added to PATH."
          # Verify Clang version
          clang --version

      # <<< NEW STEP START: Download GCC Toolchains >>>
      - name: 📥 Download GCC Toolchains (AArch64 & ARM)
        run: |
          echo "Cloning aarch64 GCC (4.9)..."
          git clone --depth=1 https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 -b lineage-19.1 gcc-aarch64
          # Add aarch64 GCC bin directory to the GitHub Actions PATH
          echo "${{ github.workspace }}/gcc-aarch64/bin" >> $GITHUB_PATH

          echo "Cloning arm GCC (4.9)..."
          git clone --depth=1 https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 -b lineage-19.1 gcc-arm
          # Add arm GCC bin directory to the GitHub Actions PATH
          echo "${{ github.workspace }}/gcc-arm/bin" >> $GITHUB_PATH

          echo "GCC Toolchains cloned and added to PATH."
          # Optional: Verify the presence of GCC executables
          echo "Verifying GCC paths:"
          ls -l ${{ github.workspace }}/gcc-aarch64/bin/aarch64-linux-android-gcc || echo "aarch64 GCC not found where expected!"
          ls -l ${{ github.workspace }}/gcc-arm/bin/arm-linux-androideabi-gcc || echo "arm GCC not found where expected!"
          echo "PATH check:"
          echo $PATH
      # <<< NEW STEP END: Download GCC Toolchains >>>

            - name: 🚀 Build Kernel + Modules & Install
        working-directory: kernel_source
        run: |
          #─── Basic Environment Setup (Updated) ───────────────────────────────
          # ... (rest of the exports remain the same) ...
          export ARCH="arm64"
          export CLANG_TRIPLE="aarch64-linux-android-"
          export CROSS_COMPILE="aarch64-linux-android-"
          export CROSS_COMPILE_ARM32="arm-linux-androideabi-"
          export KBUILD_BUILD_USER="GitHubActions"
          export KBUILD_BUILD_HOST="github.com"

          #─── Force LLVM/Clang Usage (Updated) ─────────────────────────────────
          export PATH=${{ github.workspace }}/clang/bin:${{ github.workspace }}/gcc-aarch64/bin:${{ github.workspace }}/gcc-arm/bin:$PATH
          export CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm"
          export OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" READELF="llvm-readelf" STRIP="llvm-strip"
          export OBJSIZE="llvm-size" LLVM_AR="llvm-ar" LLVM_NM="llvm-nm" LLVM_DIS="llvm-dis"
          export LDGOLD="aarch64-linux-android-ld.gold"

          #─── BSP Specific Flags (Board Support Package) ────────────────────────
          export BSP_BUILD_ANDROID_OS="y"
          export BSP_BUILD_FAMILY="qogirl6"

          #─── Prepare Output Directory & Config ───────────────────────────────
          echo "Preparing output directory and kernel config..."
          mkdir -p out
          if [ ! -f stock_kernel.config ]; then
            echo "❌ Error: stock_kernel.config not found in kernel_source directory."
            exit 1
          fi
          cp stock_kernel.config out/.config
          echo ".config prepared."

          #─── Generate Final Config (olddefconfig) ────────────────────────────
          echo "Generating final .config using 'make olddefconfig'..."
          # Add HOSTLDLIBS here too, just in case olddefconfig triggers any host tool builds
          make O=out \
               ARCH=${ARCH} \
               CLANG_TRIPLE=${CLANG_TRIPLE} \
               CROSS_COMPILE=${CROSS_COMPILE} \
               CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
               CC=${CC} \
               LD=${LD} \
               AR=${AR} \
               NM=${NM} \
               OBJCOPY=${OBJCOPY} \
               STRIP=${STRIP} \
               KBUILD_BUILD_USER="${KBUILD_BUILD_USER}" \
               KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}" \
               BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} \
               BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY} \
               HOSTLDLIBS="-lyaml" \
               olddefconfig
          echo "'make olddefconfig' finished."

          #─── Build Kernel, DTBs, and Modules ─────────────────────────────────
          echo "Starting kernel build (Image.gz, dtbs, modules)..."
          echo "::group::Build Kernel, DTBs, and Modules (Verbose Log)"
          # Add HOSTLDLIBS="-lyaml" HERE - This is the most important place
          make O=out -j$(nproc) V=1 \
               ARCH=${ARCH} \
               CLANG_TRIPLE=${CLANG_TRIPLE} \
               CROSS_COMPILE=${CROSS_COMPILE} \
               CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
               CC=${CC} \
               LD=${LD} \
               AR=${AR} \
               NM=${NM} \
               OBJCOPY=${OBJCOPY} \
               STRIP=${STRIP} \
               KBUILD_BUILD_USER="${KBUILD_BUILD_USER}" \
               KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}" \
               BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} \
               BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY} \
               HOSTLDLIBS="-lyaml" \
               Image.gz dtbs modules
          echo "::endgroup::"
          echo "Main kernel build finished."

          #─── Install Modules, Run depmod, Strip Modules ───────────────────────
          echo "Processing kernel modules..."
          echo "::group::Install, Depmod, Strip Modules"
          rm -rf "${{ env.MODULES_STAGING_PATH }}"
          mkdir -p "${{ env.MODULES_STAGING_PATH }}"
          echo "Installing modules to staging path: ${{ env.MODULES_STAGING_PATH }}"
          # Add HOSTLDLIBS here too, just in case modules_install triggers any host tool builds
          make O=out \
               ARCH=${ARCH} \
               CLANG_TRIPLE=${CLANG_TRIPLE} \
               CROSS_COMPILE=${CROSS_COMPILE} \
               CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
               CC=${CC} \
               LD=${LD} \
               AR=${AR} \
               NM=${NM} \
               OBJCOPY=${OBJCOPY} \
               STRIP=${STRIP} \
               KBUILD_BUILD_USER="${KBUILD_BUILD_USER}" \
               KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}" \
               BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} \
               BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY} \
               INSTALL_MOD_PATH="${{ env.MODULES_STAGING_PATH }}" \
               HOSTLDLIBS="-lyaml" \
               modules_install


          # Find the kernel version directory created by modules_install
          # Use find to be more robust against potential multiple directories (though unlikely)
          KVER_DIR=$(find "${{ env.MODULES_STAGING_PATH }}/lib/modules/" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -n 1)
          if [ -z "$KVER_DIR" ]; then
            echo "⚠️ Warning: Kernel version directory not found in staging path. Skipping depmod and strip."
            # Set KVER to empty to signal skipping later steps cleanly
            KVER=""
          else
            # Extract kernel version string from the directory path
            KVER=$(basename "$KVER_DIR")
            echo "Found kernel version: $KVER"
            MODULES_DIR="${{ env.MODULES_STAGING_PATH }}/lib/modules/$KVER" # Full path to modules

            # Check if actual kernel modules exist before running depmod/strip
            if [ ! -d "$MODULES_DIR/kernel" ] || [ -z "$(find "$MODULES_DIR/kernel" -name '*.ko')" ]; then
               echo "⚠️ Warning: No kernel modules (.ko files) found for $KVER in $MODULES_DIR/kernel. Skipping depmod and strip."
               # Set KVER to empty to signal skipping packaging later
               KVER=""
            else
               # Generate modules.dep and map files using depmod
               echo "Running depmod for kernel $KVER..."
               # Use -b to specify the base directory containing the lib/modules structure
               depmod -a -b "${{ env.MODULES_STAGING_PATH }}" "$KVER"
               echo "depmod finished."

               # Strip debugging symbols from the installed kernel modules
               echo "Stripping modules..."
               # Use find to locate all .ko files and execute strip (llvm-strip) on them
               find "$MODULES_DIR" -name '*.ko' -exec ${STRIP} --strip-unneeded {} +
               echo "Stripping finished."
            fi
          fi
          echo "::endgroup::"

          #─── Verify Build Success ──────────────────────────────────────────────
          echo "Verifying kernel image presence..."
          if [ ! -f out/arch/${ARCH}/boot/Image.gz ]; then
            echo "❌ Build failed: Kernel image 'out/arch/${ARCH}/boot/Image.gz' not found."
            exit 1
          fi
          echo "✅ Kernel build and module processing successful!"

      - name: 📦 Prepare Artifact (Compress Modules)
        run: |
          ARTIFACT_DIR="$GITHUB_WORKSPACE/artifact"
          mkdir -p "$ARTIFACT_DIR"
          echo "Preparing artifacts in $ARTIFACT_DIR..."

          # Copy Kernel Image
          echo "Copying Kernel Image.gz..."
          cp kernel_source/out/arch/${ARCH}/boot/Image.gz "$ARTIFACT_DIR/"

          # Copy DTBs (Device Tree Blobs)
          echo "Copying DTBs..."
          # Find all .dtb files in the output dts directory and copy them
          find kernel_source/out/arch/${ARCH}/boot/dts/ -name '*.dtb' -exec cp -v {} "$ARTIFACT_DIR/" \;

          # Create compressed tarball of modules (only if KVER was successfully determined and modules exist)
          # This uses the KVER variable determined in the previous step
          KVER_FROM_BUILD_STEP=$(find "${{ env.MODULES_STAGING_PATH }}/lib/modules/" -mindepth 1 -maxdepth 1 -type d -exec basename {} \; 2>/dev/null | head -n 1)

          if [ -n "$KVER_FROM_BUILD_STEP" ]; then
            MODULES_INSTALL_DIR="${{ env.MODULES_STAGING_PATH }}/lib/modules/$KVER_FROM_BUILD_STEP"
            # Double check if the kernel subdirectory exists (where .ko files reside)
            if [ -d "$MODULES_INSTALL_DIR/kernel" ] && [ -n "$(find "$MODULES_INSTALL_DIR/kernel" -name '*.ko')" ]; then
              echo "Modules found for kernel $KVER_FROM_BUILD_STEP, creating compressed tarball artifact/modules-$KVER_FROM_BUILD_STEP.tar.gz"
              # Create a gzipped tar archive of the modules
              # -C changes directory before archiving, so paths inside the archive are relative to $MODULES_INSTALL_DIR
              # '.' specifies archiving everything within that directory
              tar czf "$ARTIFACT_DIR/modules-$KVER_FROM_BUILD_STEP.tar.gz" -C "$MODULES_INSTALL_DIR" .
              echo "Module tarball created."
            else
              echo "No actual kernel modules (.ko files) found in $MODULES_INSTALL_DIR/kernel. Skipping module packaging."
            fi
          else
            echo "No kernel modules were successfully installed/processed. Skipping module packaging."
          fi

          echo "Artifact preparation finished. Contents of $ARTIFACT_DIR:"
          ls -l "$ARTIFACT_DIR"

      - name: 📤 Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-${{ github.run_id }} # Unique artifact name including run ID
          path: ${{ github.workspace }}/artifact/* # Upload all files within the artifact directory
          if-no-files-found: error # Fail the workflow if no artifact files were generated
