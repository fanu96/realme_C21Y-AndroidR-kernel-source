# .github/workflows/build_kernel.yaml
name: Build Kernel & Modules (Simplified Env) for Realme C21Y

on:
  workflow_dispatch:

env:
  # Define Output Directory and Modules Staging Path
  OUT_DIR: ${{ github.workspace }}/out
  MODULES_STAGING_PATH: ${{ github.workspace }}/modules_staging
  # ARCH is set via export in the build step now

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📜 Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel_source # Your C21Y kernel source

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            lsb-release make python3 rsync wget zip unzip \
            libyaml-dev pkg-config \
            crossbuild-essential-arm64 # Keep this for potential host tools needed by build system

      # --- Toolchain Setup (Required by EXPORTED variables) ---
      - name: 📥 Download Clang Toolchain (r416183b) & Add to PATH
        run: |
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524.git -b 10.0 clang
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH
          echo "Clang PATH added to GITHUB_PATH"

      - name: 📥 Download GCC AArch64 Toolchain (4.9) & Add to PATH
        run: |
          git clone --depth=1 https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 -b lineage-19.1 aarch64-gcc
          echo "${{ github.workspace }}/aarch64-gcc/bin" >> $GITHUB_PATH
          echo "GCC AArch64 PATH added to GITHUB_PATH"

      - name: 📥 Download GCC ARM Toolchain (4.9) & Add to PATH
        run: |
          git clone --depth=1 https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 -b lineage-19.1 arm-gcc
          echo "${{ github.workspace }}/arm-gcc/bin" >> $GITHUB_PATH
          echo "GCC ARM PATH added to GITHUB_PATH"

      # --- Build Step using Exported Environment ---
      - name: 🚀 Build Kernel + Modules & Install
        working-directory: kernel_source
        run: |
          #─── Verify PATH ─────────────────────────────────────────────────────
          echo "Current PATH: $PATH"
          echo "--- Verifying Toolchains ---"
          which clang || echo "WARNING: clang not found"
          which aarch64-linux-android-gcc || echo "WARNING: aarch64-linux-android-gcc not found"
          which arm-linux-androideabi-gcc || echo "WARNING: arm-linux-androideabi-gcc not found"
          which ld.lld || echo "WARNING: ld.lld not found"
          which llvm-ar || echo "WARNING: llvm-ar not found"
          echo "--------------------------"

          #─── Set Build Environment Variables (Exactly as provided) ────────────
          # PATH is already set via GITHUB_PATH in previous steps
          export ARCH="arm64"
          export CC="clang"
          export CLANG_TRIPLE="aarch64-linux-gnu-" # Note: Value changed to match Clang standard
          export CROSS_COMPILE="aarch64-linux-android-"
          export CROSS_COMPILE_ARM32="arm-linux-androideabi-"
          export LD="ld.lld"
          export AR="llvm-ar"
          export NM="llvm-nm"
          export OBJCOPY="llvm-objcopy"
          export OBJDUMP="llvm-objdump"
          export READELF="llvm-readelf"
          export OBJSIZE="llvm-size"
          export STRIP="llvm-strip"
          export LDGOLD="aarch64-linux-gnu-ld.gold" # Usually not needed when LD=ld.lld, but keeping as requested
          export LLVM_AR="llvm-ar"
          export LLVM_DIS="llvm-dis"
          export BSP_BUILD_ANDROID_OS="y"
          export BSP_BUILD_FAMILY="qogirl6"
          export KBUILD_BUILD_USER="fanu" # Good practice
          export KBUILD_BUILD_HOST="github.com"
          export LLVM=1
          export LLVM_IAS=1 
          export HOSTCC="clang"
          export HOSTCXX="clang++"
          export HOSTLD="ld.lld" 
          export HOSTAR="llvm-ar"

          #─── YAML libs for dtc (still needed with HOSTCC=clang) ──────────────
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}
          YAML_LIBS=$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml -L/usr/lib/x86_64-linux-gnu")
          export HOSTLDFLAGS="$YAML_LIBS"

          #─── Prepare output & config ───────────────────────────────────────────
          mkdir -p ${{ env.OUT_DIR }}
          # IMPORTANT: Replace 'YOUR_C21Y_DEFCONFIG_NAME' with your actual defconfig file name
          # Example: cp arch/arm64/configs/spd_ulysse_defconfig ${{ env.OUT_DIR }}/.config
          cp stock_kernel.config ${{ env.OUT_DIR }}/.config
          # Or if it's at the root: cp YOUR_C21Y_DEFCONFIG_NAME ${{ env.OUT_DIR }}/.config

          # Make will use the exported variables automatically
          make O=${{ env.OUT_DIR }} olddefconfig

          #─── Build kernel + DTBs + Modules ───────────────────────────────────
          echo "::group::Build Kernel, DTBs, and Modules"
          make -j$(nproc) O=${{ env.OUT_DIR }} V=1 \
               STOP_SHIP_TRACEPRINTK=1 \
               Image.gz dtbs modules
          echo "::endgroup::"

          #─── Get Kernel Version String ─────────────────────────────────────────
          KVER=$(make O=${{ env.OUT_DIR }} kernelrelease)
          if [ -z "$KVER" ]; then
            echo "❌ Error: Failed to determine kernel version using 'make O=${{ env.OUT_DIR }} kernelrelease'."
            exit 1
          fi
          echo "Kernel version determined as: $KVER"

          #─── Install Modules, Run depmod, Strip Modules ───────────────────────
          echo "::group::Install, Depmod, Strip Modules"
          # Clean previous staging area
          rm -rf "${{ env.MODULES_STAGING_PATH }}"
          mkdir -p "${{ env.MODULES_STAGING_PATH }}"

          # Install modules (Make uses exported variables)
          make O=${{ env.OUT_DIR }} \
               INSTALL_MOD_PATH="${{ env.MODULES_STAGING_PATH }}" \
               modules_install

          MODULES_DIR="${{ env.MODULES_STAGING_PATH }}/lib/modules/$KVER"

          # Check if actual module files were installed
          if [ ! -d "$MODULES_DIR/kernel" ] && [ -z "$(find "$MODULES_DIR" -name '*.ko' 2>/dev/null)" ]; then
            echo "⚠️ Warning: No kernel modules (.ko files) found for $KVER in $MODULES_DIR. Skipping depmod and strip."
          else
            echo "Found kernel modules for $KVER. Running depmod and stripping..."
            # Generate modules.dep etc.
            echo "Running depmod..."
            depmod -a -b "${{ env.MODULES_STAGING_PATH }}" "$KVER"
            echo "depmod finished."
            # Strip modules using the exported STRIP variable (llvm-strip)
            echo "Stripping modules using $STRIP..."
            find "$MODULES_DIR" -name '*.ko' -exec $STRIP --strip-unneeded {} +
            echo "Stripping finished."
          fi
          echo "::endgroup::"

          #─── Verify build success (Image.gz only) ─────────────────────────────
          if [ ! -f ${{ env.OUT_DIR }}/arch/${ARCH}/boot/Image.gz ]; then
            echo "❌ Build failed: ${{ env.OUT_DIR }}/arch/${ARCH}/boot/Image.gz not found."
            exit 1
          fi
          echo "✅ Kernel build and module processing successful!"
          # Expose KVER for the next step
          echo "KVER=$KVER" >> $GITHUB_ENV


      - name: 📦 Prepare Artifact (Compress Modules)
        # Uses KVER from the previous step's environment output
        run: |
          ARTIFACT_DIR="$GITHUB_WORKSPACE/artifact"
          mkdir -p "$ARTIFACT_DIR"

          # Copy Kernel Image
          # ARCH should be available if needed, but OUT_DIR is absolute
          cp "${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz" "$ARTIFACT_DIR/"

          # Copy DTBs
          find "${{ env.OUT_DIR }}/arch/arm64/boot/dts/" -name '*.dtb' -exec cp {} "$ARTIFACT_DIR/" \;

          # Create compressed tarball of modules (if they exist and KVER is known)
          if [ -z "$KVER" ]; then
             echo "KVER is unknown, skipping module packaging."
          else
            MODULES_INSTALL_DIR="${{ env.MODULES_STAGING_PATH }}/lib/modules/$KVER"
            # Check for kernel dir OR module dependency files
            if [ -d "$MODULES_INSTALL_DIR/kernel" ] || [ -n "$(find "$MODULES_INSTALL_DIR" -maxdepth 1 -name 'modules.*' 2>/dev/null)" ]; then
               echo "Modules/dep files found for kernel $KVER, creating compressed tarball artifact/modules-$KVER.tar.gz"
               tar czf "$ARTIFACT_DIR/modules-$KVER.tar.gz" -C "$MODULES_INSTALL_DIR" .
            else
               echo "No actual kernel modules (.ko files) or dep files found in $MODULES_INSTALL_DIR, skipping module packaging."
            fi
          fi

      - name: 📤 Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-${{ github.run_id }}
          path: ${{ github.workspace }}/artifact/*
          if-no-files-found: error
