name: Build Kernel for Realme C21Y (RMX3261/RMX3263) using Custom Config V2

on:
  workflow_dispatch: # Allows manual triggering

env:
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📜 Checkout kernel source
      uses: actions/checkout@v4
      with:
        path: kernel_source # Checks out your kernel source to this directory

    - name: 🔧 Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
          flex git kmod libelf-dev libncurses5-dev libssl-dev \
          lsb-release make python3 rsync wget zip unzip \
          libyaml-dev pkg-config

    # --- Optional Caching Steps (Uncomment if desired) ---
    # - name: Cache apt packages
    #   uses: actions/cache@v4
    #   with:
    #     path: /var/cache/apt/archives
    #     key: ${{ runner.os }}-apt-${{ hashFiles('**/lockfiles') }} # Adjust key as needed
    #     restore-keys: |
    #       ${{ runner.os }}-apt-
    #
    # - name: Cache Clang Toolchain
    #   id: cache-clang
    #   uses: actions/cache@v4
    #   with:
    #     path: clang
    #     key: ${{ runner.os }}-clang-r353983c

    - name: 📥 Download Clang Toolchain (crDroid r353983c / Clang 11.0.2)
      # if: steps.cache-clang.outputs.cache-hit != 'true' # Uncomment if using cache
      run: |
        echo "Downloading crDroid Clang r353983c..."
        git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang

    - name: Add Clang to PATH and Verify
      run: |
        echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
        $GITHUB_WORKSPACE/clang/bin/clang --version

    - name: 🚀 Build Kernel with Custom Config
      working-directory: kernel_source # Sets the working directory for this step
      run: |
        # Set and export build environment variables
        export ARCH=${{ env.ARCH }}
        export KERNEL_DIR=$(pwd) # pwd is now $GITHUB_WORKSPACE/kernel_source
        export CLANG_TRIPLE="aarch64-linux-gnu-"
        export CROSS_COMPILE="aarch64-linux-gnu-"
        export KBUILD_BUILD_USER="GitHubActions"
        export KBUILD_BUILD_HOST="github.com"

        # Export compilers and linkers for target
        export CC=$GITHUB_WORKSPACE/clang/bin/clang
        export CXX=$GITHUB_WORKSPACE/clang/bin/clang++
        export LD=$GITHUB_WORKSPACE/clang/bin/ld.lld
        export AR=$GITHUB_WORKSPACE/clang/bin/llvm-ar
        export NM=$GITHUB_WORKSPACE/clang/bin/llvm-nm
        export OBJCOPY=$GITHUB_WORKSPACE/clang/bin/llvm-objcopy
        export OBJDUMP=$GITHUB_WORKSPACE/clang/bin/llvm-objdump
        export STRIP=$GITHUB_WORKSPACE/clang/bin/llvm-strip
        export READELF=$GITHUB_WORKSPACE/clang/bin/llvm-readelf
        export LLVM=1
        export LLVM_IAS=1

        # Export compilers for host
        export HOSTCC=$GITHUB_WORKSPACE/clang/bin/clang
        export HOSTCXX=$GITHUB_WORKSPACE/clang/bin/clang++

        # Handle YAML linking for DTC
        export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}
        # Try pkg-config first, provide specific fallback if it fails
        YAML_LIBS=$(pkg-config --libs yaml-0.1 2>/dev/null)
        if [ -z "$YAML_LIBS" ]; then
          echo "Warning: pkg-config couldn't find yaml-0.1, using fallback HOST_LDFLAGS=-lyaml"
          YAML_LIBS="-lyaml -L/usr/lib/x86_64-linux-gnu" # Added specific library path for fallback
        else
          echo "Using HOST_LDFLAGS from pkg-config: $YAML_LIBS"
        fi
        export HOST_LDFLAGS="$YAML_LIBS"
        echo "Final HOST_LDFLAGS to be used: $HOST_LDFLAGS" # Log the final value clearly

        # --- Use Custom Config ---
        echo "Preparing output directory..."
        mkdir -p out # Ensure the output directory exists

        echo "--> Checking for custom config file (stock_kernel.config) in current directory ($(pwd))..."
        ls -l stock_kernel.config # List the file specifically if it exists
        if [ ! -f "stock_kernel.config" ]; then
          echo "---------------------------------------------------------------------"
          echo "❌ FATAL ERROR: Custom config file 'stock_kernel.config' not found!"
          echo "   Please ensure the file exists in the ROOT of your kernel source"
          echo "   repository and is named exactly 'stock_kernel.config'."
          echo "   Current directory contents:"
          ls -la
          echo "---------------------------------------------------------------------"
          exit 1
        fi

        echo "--> Attempting to copy 'stock_kernel.config' to 'out/.config'..."
        cp stock_kernel.config out/.config

        echo "--> Verifying presence and content of 'out/.config'..."
        ls -l out/.config # *** ADDED VERIFICATION ***
        if [ ! -f "out/.config" ]; then
           echo "---------------------------------------------------------------------"
           echo "❌ FATAL ERROR: Failed to copy 'stock_kernel.config' to 'out/.config'!"
           echo "   Check permissions or disk space."
           echo "---------------------------------------------------------------------"
           exit 1
        fi
        echo "   'out/.config' exists. First 5 lines:"
        head -n 5 out/.config # Show the first few lines to confirm it's not empty/wrong
        echo "✅ Custom config 'out/.config' seems okay."
        # --- End Custom Config Section ---

        # Build the kernel with Clang using the copied .config
        echo "Building kernel using custom 'out/.config' (using $(nproc) threads)..."
        make -j$(nproc) O=out V=1 \
             CC="${CC}" CXX="${CXX}" \
             HOSTCC="${HOSTCC}" HOSTCXX="${HOSTCXX}" \
             HOSTLDFLAGS="${HOST_LDFLAGS}" \
             Image.gz dtbs

        # Check if the build was successful
        KERNEL_IMAGE_PATH="out/arch/${ARCH}/boot/Image.gz"
        if [ ! -f "${KERNEL_IMAGE_PATH}" ]; then
          echo "❌ Kernel build failed! Output file '${KERNEL_IMAGE_PATH}' not found."
          exit 1
        fi
        echo "✅ Kernel build successful!"

    - name: 📦 Prepare Artifact
      run: |
        mkdir -p $GITHUB_WORKSPACE/artifact
        cp kernel_source/out/arch/${{ env.ARCH }}/boot/Image.gz $GITHUB_WORKSPACE/artifact/
        find kernel_source/out/arch/${{ env.ARCH }}/boot/dts/ -name '*.dtb' -exec cp {} $GITHUB_WORKSPACE/artifact/ \;
        echo "Contents of artifact directory:"
        ls -R $GITHUB_WORKSPACE/artifact

    - name: 📤 Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ github.run_id }} # Unique name for the artifact zip
        path: ${{ github.workspace }}/artifact/* # Upload all files in the artifact dir
        if-no-files-found: error # Fail the workflow if no files are found to upload
