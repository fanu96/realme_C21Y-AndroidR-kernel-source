name: Build Kernel for Realme C21Y (RMX3261/RMX3263) with Custom Config + olddefconfig

on:
  workflow_dispatch:
    inputs:
      INPUT_LOCALVERSION:
        description: 'Custom localversion suffix (e.g., -MyBuild)'
        required: false
        default: '' # Default to empty if not provided

env:
  ARCH: arm64
  KERNEL_SOURCE_DIR: kernel_source # Define source directory path
  CLANG_DIR: clang # Define clang directory path
  ARTIFACT_DIR: artifact # Define artifact directory path

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📜 Checkout kernel source
      uses: actions/checkout@v4
      with:
        path: ${{ env.KERNEL_SOURCE_DIR }}
        fetch-depth: 1 # Use fetch-depth: 1 for faster checkout unless full history is needed

    - name: 🔧 Install Dependencies
      run: |
        set -e # Exit immediately if a command fails
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
          flex git kmod libelf-dev libncurses5-dev libssl-dev \
          lsb-release make python3 rsync wget zip unzip \
          libyaml-dev pkg-config tar lz4

    - name: 📥 Download Clang Toolchain (crDroid Clang 11 / r353983c)
      run: |
        set -e
        echo "Downloading crDroid Clang..."
        # Corrected URL
        git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 ${{ env.CLANG_DIR }}
        echo "Adding Clang to PATH..."
        echo "$GITHUB_WORKSPACE/${{ env.CLANG_DIR }}/bin" >> $GITHUB_PATH
        echo "Verifying Clang version..."
        clang --version

    - name: 📥 Fetch and Unpack SPRD Libraries
      run: |
        set -e
        # Ensure tools directory exists within the kernel source
        mkdir -p ${{ env.KERNEL_SOURCE_DIR }}/tools
        cd ${{ env.KERNEL_SOURCE_DIR }}/tools
        echo "Cloning SPRD additional libraries..."
        git clone --depth=1 https://gitlab.com/Rissu-Projekt/additional.git lib64
        cd lib64
        echo "Extracting libraries..."
        for i in {01..07}; do
          echo "Extracting part${i}.tar.xz..."
          tar -xvf part${i}.tar.xz && rm part${i}.tar.xz
        done
        echo "Libraries extracted into ${{ env.KERNEL_SOURCE_DIR }}/tools/lib64"

    - name: 🚀 Build Kernel
      working-directory: ${{ env.KERNEL_SOURCE_DIR }} # Work within the kernel source directory
      run: |
        set -e # Exit on error

        # --- Environment Setup ---
        echo "Setting up build environment..."
        export ARCH=${{ env.ARCH }}
        export KERNEL_DIR=$(pwd)
        export CLANG_TRIPLE="aarch64-linux-gnu-"
        export CROSS_COMPILE="aarch64-linux-gnu-"
        export KBUILD_BUILD_USER="GitHubActions"
        export KBUILD_BUILD_HOST="github.com"
        # Use input for LOCALVERSION, append '-' only if not empty
        export LOCALVERSION="${{ github.event.inputs.INPUT_LOCALVERSION }}"

        # Clang paths relative to GITHUB_WORKSPACE
        CLANG_BIN_PATH="$GITHUB_WORKSPACE/${{ env.CLANG_DIR }}/bin"
        export CC="${CLANG_BIN_PATH}/clang"
        export CXX="${CLANG_BIN_PATH}/clang++"
        export LD="${CLANG_BIN_PATH}/ld.lld"
        export AR="${CLANG_BIN_PATH}/llvm-ar"
        export NM="${CLANG_BIN_PATH}/llvm-nm"
        export OBJCOPY="${CLANG_BIN_PATH}/llvm-objcopy"
        export OBJDUMP="${CLANG_BIN_PATH}/llvm-objdump"
        export STRIP="${CLANG_BIN_PATH}/llvm-strip"
        export READELF="${CLANG_BIN_PATH}/llvm-readelf"
        export LLVM=1
        export LLVM_IAS=1

        export HOSTCC="${CLANG_BIN_PATH}/clang"
        export HOSTCXX="${CLANG_BIN_PATH}/clang++"

        # Handle YAML linking for DTC
        export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}
        YAML_LIBS=$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml -L/usr/lib/x86_64-linux-gnu")
        export HOST_LDFLAGS="${YAML_LIBS}"
        echo "HOST_LDFLAGS=${HOST_LDFLAGS}"

        # --- Config Generation ---
        export KBUILD_OUTPUT=out # Use KBUILD_OUTPUT instead of O= for consistency
        mkdir -p ${KBUILD_OUTPUT}

        echo "--> Checking for custom config file (stock_kernel.config)..."
        if [ ! -f "stock_kernel.config" ]; then
          echo "❌ FATAL ERROR: Custom config file 'stock_kernel.config' not found in ${KERNEL_DIR}!"
          exit 1
        fi
        ls -l stock_kernel.config

        echo "--> Copying 'stock_kernel.config' to '${KBUILD_OUTPUT}/.config'..."
        cp stock_kernel.config ${KBUILD_OUTPUT}/.config
        ls -l ${KBUILD_OUTPUT}/.config
        if [ ! -f "${KBUILD_OUTPUT}/.config" ]; then
           echo "❌ FATAL ERROR: Failed to copy 'stock_kernel.config' to '${KBUILD_OUTPUT}/.config'!"
           exit 1
        fi
        echo "✅ Custom config '${KBUILD_OUTPUT}/.config' prepared."

        echo "--> Updating config with defaults using 'make olddefconfig'..."
        # Pass variables directly to make
        make \
             KBUILD_OUTPUT=${KBUILD_OUTPUT} \
             ARCH=${ARCH} \
             CROSS_COMPILE=${CROSS_COMPILE} \
             LOCALVERSION=${LOCALVERSION} \
             CC="${CC}" CXX="${CXX}" LD="${LD}" AR="${AR}" NM="${NM}" OBJCOPY="${OBJCOPY}" OBJDUMP="${OBJDUMP}" STRIP="${STRIP}" READELF="${READELF}" \
             HOSTCC="${HOSTCC}" HOSTCXX="${HOSTCXX}" \
             HOSTLDFLAGS="${HOST_LDFLAGS}" \
             LLVM=1 LLVM_IAS=1 \
             olddefconfig
        echo "✅ Config updated with defaults."

        # Check module signature settings (optional but good)
        if grep -q "CONFIG_MODULE_SIG_FORCE=y" ${KBUILD_OUTPUT}/.config; then
          echo "⚠️ Warning: CONFIG_MODULE_SIG_FORCE=y is set."
          if [ ! -f "certs/signing_key.pem" ]; then
            echo "❌ ERROR: Module signing is forced, but 'certs/signing_key.pem' not found!"
            # Consider exiting if signing is mandatory for boot exit 1
          else
            echo "✅ Found 'certs/signing_key.pem'."
          fi
        fi

        # --- Build Kernel ---
        echo "Building kernel with $(nproc) threads... Outputting to build.log"
        make -j$(nproc) V=1 \
             KBUILD_OUTPUT=${KBUILD_OUTPUT} \
             ARCH=${ARCH} \
             CROSS_COMPILE=${CROSS_COMPILE} \
             LOCALVERSION=${LOCALVERSION} \
             CC="${CC}" CXX="${CXX}" LD="${LD}" AR="${AR}" NM="${NM}" OBJCOPY="${OBJCOPY}" OBJDUMP="${OBJDUMP}" STRIP="${STRIP}" READELF="${READELF}" \
             HOSTCC="${HOSTCC}" HOSTCXX="${HOSTCXX}" \
             HOSTLDFLAGS="${HOST_LDFLAGS}" \
             LLVM=1 LLVM_IAS=1 \
             Image.gz dtbs 2>&1 | tee build.log
             # Add dtbo.img here if needed for your specific device variant

        # --- Verify Build Output ---
        KERNEL_IMAGE_PATH="${KBUILD_OUTPUT}/arch/${ARCH}/boot/Image.gz"
        if [ ! -f "${KERNEL_IMAGE_PATH}" ]; then
          echo "❌ Kernel build failed! Output file '${KERNEL_IMAGE_PATH}' not found."
          echo "--- Build Log Tail ---"
          tail -n 50 build.log # Show last 50 lines of log on failure
          exit 1
        fi
        echo "✅ Kernel build successful: ${KERNEL_IMAGE_PATH}"
        echo "Generated DTBs:"
        ls -l ${KBUILD_OUTPUT}/arch/${ARCH}/boot/dts/

    - name: 📦 Package Artifact
      run: |
        set -e
        echo "Creating artifact directory..."
        mkdir -p ${{ env.ARTIFACT_DIR }}

        # Define paths relative to workspace
        KSOURCE=$GITHUB_WORKSPACE/${{ env.KERNEL_SOURCE_DIR }}
        KOUTPUT=$KSOURCE/out # Matches KBUILD_OUTPUT used in build step
        DEST=$GITHUB_WORKSPACE/${{ env.ARTIFACT_DIR }}

        echo "Copying Image.gz..."
        cp ${KOUTPUT}/arch/${{ env.ARCH }}/boot/Image.gz ${DEST}/

        echo "Copying DTBs..."
        find ${KOUTPUT}/arch/${{ env.ARCH }}/boot/dts/ -name '*.dtb' -exec cp {} ${DEST}/ \;
        # Copy dtbo.img if built: cp ${KOUTPUT}/arch/${{ env.ARCH }}/boot/dtbo.img ${DEST}/

        echo "Creating zip archive..."
        cd ${DEST}
        zip -r kernel-build-${{ github.run_id }}.zip .
        echo "Artifact packaged in ${DEST}/kernel-build-${{ github.run_id }}.zip"

    - name: 📜 Save Build Log
      if: always() # Run even if previous steps fail
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ github.run_id }}
        # Path to the log file created in the build step
        path: ${{ env.KERNEL_SOURCE_DIR }}/build.log
        if-no-files-found: warn # Don't fail if log somehow doesn't exist

    - name: 📤 Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-package-${{ github.run_id }} # Artifact name in GitHub UI
        # Path to the zip file created in the packaging step
        path: ${{ env.ARTIFACT_DIR }}/kernel-build-${{ github.run_id }}.zip
        if-no-files-found: error # Fail if the zip file wasn't created
