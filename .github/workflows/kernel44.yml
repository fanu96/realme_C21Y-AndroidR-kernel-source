name: Build Kernel (Minimal)

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  build_kernel:
    name: Build Kernel
    runs-on: ubuntu-latest

    env:
      # --- Define your base settings here ---
      KERNEL_SOURCES_DIR: ${{ github.workspace }} # Kernel source code location
      OBJ_DIR: ${{ github.workspace }}/out      # Build output directory
      CLANG_INSTALL_DIR: ${{ github.workspace }}/clang-toolchain # Clang installation directory
      
      ARCH: arm64
      CONFIG_FILE: rmx3261_defconfig       # <<< YOUR KERNEL DEFCONFIG FILE NAME
      KERNEL_ARTIFACT_PREFIX: "MyKernel" # <<< PREFIX FOR THE UPLOADED ARTIFACT NAME

      CLANG_REPO_URL: https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524.git
      CLANG_REPO_BRANCH: '10.0'
      # --- End of base settings ---

    steps:
      - name: Checkout Kernel Sources
        uses: actions/checkout@v4
        with:
          path: ${{ env.KERNEL_SOURCES_DIR }}

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libncurses-dev \
            llvm lld

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-
      - run: |
          ccache -M 5G # Set ccache size
          ccache -z    # Zero ccache statistics

      - name: Setup Clang Toolchain
        uses: actions/cache@v4
        id: clang-cache
        with:
          path: ${{ env.CLANG_INSTALL_DIR }}
          key: ${{ runner.os }}-clang-${{ env.CLANG_REPO_URL }}-${{ env.CLANG_REPO_BRANCH }}
      
      - name: Clone Clang Toolchain (if not cached)
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          echo "Clang toolchain not found in cache. Cloning to ${{ env.CLANG_INSTALL_DIR }}..."
          git clone --depth=1 --single-branch -q ${{ env.CLANG_REPO_URL }} -b ${{ env.CLANG_REPO_BRANCH }} ${{ env.CLANG_INSTALL_DIR }}
        
      - name: Add Clang to PATH
        run: |
          echo "${{ env.CLANG_INSTALL_DIR }}/bin" >> $GITHUB_PATH

      - name: Generate Defconfig
        working-directory: ${{ env.KERNEL_SOURCES_DIR }}
        run: |
          make O=${{ env.OBJ_DIR }} ARCH=${{ env.ARCH }} ${{ env.CONFIG_FILE }}

      - name: Compile Kernel
        working-directory: ${{ env.KERNEL_SOURCES_DIR }}
        run: |
          make -j$(nproc --all) \
            O=${{ env.OBJ_DIR }} \
            ARCH=${{ env.ARCH }} \
            CC="ccache clang" \
            CLANG_TRIPLE="aarch64-linux-gnu-" \
            CROSS_COMPILE="aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="arm-linux-gnueabi-" \
            LLVM=1 \
            LLVM_IAS=1

      - name: Package Kernel Outputs
        run: |
          # Define paths to expected kernel output files
          IMAGE_FILE="${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/Image"
          DTBO_FILE="${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img"
          IMAGE_GZ_DTB_FILE="${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz-dtb" # Common alternative/addition

          # Check if mandatory files exist
          if [[ ! -f "$IMAGE_FILE" ]]; then
            echo "Error: Kernel Image not found at $IMAGE_FILE"
            exit 1
          fi
          if [[ ! -f "$DTBO_FILE" ]]; then
            echo "Error: dtbo.img not found at $DTBO_FILE"
            exit 1
          fi

          # Name of the zip file that will be created on the runner
          ZIP_TO_CREATE="${{ github.workspace }}/kernel_output.zip"
          
          # Temporary directory for collecting files to zip
          # This helps in creating a clean zip without parent directory structures
          PACKAGE_DIR="${{ github.workspace }}/_kernel_package_temp"
          mkdir -p "$PACKAGE_DIR"

          echo "Copying kernel files for packaging..."
          cp "$IMAGE_FILE" "$PACKAGE_DIR/Image"
          cp "$DTBO_FILE" "$PACKAGE_DIR/dtbo.img"
          if [ -f "$IMAGE_GZ_DTB_FILE" ]; then # Package Image.gz-dtb if it exists
            cp "$IMAGE_GZ_DTB_FILE" "$PACKAGE_DIR/Image.gz-dtb"
            echo "Included Image.gz-dtb in package."
          fi

          echo "Creating zip archive: $ZIP_TO_CREATE"
          cd "$PACKAGE_DIR"
          zip -r9 "$ZIP_TO_CREATE" .
          cd "${{ github.workspace }}" # Go back to the main workspace
          rm -rf "$PACKAGE_DIR"       # Clean up the temporary packaging directory
          
          echo "Kernel successfully packaged into $ZIP_TO_CREATE"

      - name: Upload Kernel Artifact
        if: success() # Only run if previous steps were successful
        uses: actions/upload-artifact@v4
        with:
          # The name of the artifact as it will appear in GitHub Actions UI
          name: ${{ env.KERNEL_ARTIFACT_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }} # Unique name with run ID
          path: ${{ github.workspace }}/kernel_output.zip # Path to the file to upload

      - name: Print ccache statistics
        if: always() # Run this even if other steps fail, for debugging
        run: ccache -s

      - name: Build Summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Kernel build successful!"
          else
            echo "❌ Kernel build failed."
            # The exit 1 here ensures the job is marked as failed if it wasn't already
            # For example, if packaging failed but 'Upload Kernel Artifact' was skipped due to 'if: success()'
            exit 1
          fi
