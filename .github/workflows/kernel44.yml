name: Build Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OBJ_DIR: ${{ github.workspace }}/out
      CONFIG: rmx3261_defconfig
      ARCH: arm64

      # Clang
      CLANG_REPO:  https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524.git
      CLANG_BRANCH: "10.0"
      CC: clang # For TARGET, passed explicitly to make
      CLANG_TRIPLE: aarch64-linux-gnu-

      # GCC prebuilts
      GCC_BRANCH:     "lineage-19.1"
      GCC_AARCH64_REPO: https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9
      GCC_ARM_REPO:     https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9

      # Cross-compilers
      CROSS_COMPILE:        aarch64-linux-android-
      CROSS_COMPILE_ARM32:  arm-linux-androideabi-

      # LLVM tools (for TARGET, passed explicitly to make)
      LD:        ld.lld
      AR:        llvm-ar
      NM:        llvm-nm
      OBJCOPY:   llvm-objcopy
      OBJDUMP:   llvm-objdump
      READELF:   llvm-readelf
      OBJSIZE:   llvm-size
      STRIP:     llvm-strip
      LDGOLD:    aarch64-linux-gnu-ld.gold
      LLVM_AR:   llvm-ar
      LLVM_DIS:  llvm-dis

      # Build flags
      ENABLE_CCACHE:     true
      BSP_BUILD_ANDROID_OS: 'y'
      BSP_BUILD_FAMILY: 'qogirl6'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps + ccache
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc build-essential libncurses-dev git curl ccache \
            libyaml-dev pkg-config # pkg-config is essential

      - name: Clone Clang toolchain
        run: |
          set -e
          git clone --depth=1 --branch "${{ env.CLANG_BRANCH }}" "${{ env.CLANG_REPO }}" clang-toolchain
          echo "${{ github.workspace }}/clang-toolchain/bin" >> $GITHUB_PATH

      - name: Verify Clang and LLD versions
        run: |
          set -e
          echo "Clang version:"
          clang --version
          echo "LLD version:"
          ld.lld --version

      - name: Clone GCC aarch64 toolchain
        run: |
          set -e
          git clone --depth=1 --branch "${{ env.GCC_BRANCH }}" "${{ env.GCC_AARCH64_REPO }}" gcc-aarch64
          echo "${{ github.workspace }}/gcc-aarch64/bin" >> $GITHUB_PATH

      - name: Clone GCC arm toolchain
        run: |
          set -e
          git clone --depth=1 --branch "${{ env.GCC_BRANCH }}" "${{ env.GCC_ARM_REPO }}" gcc-arm
          echo "${{ github.workspace }}/gcc-arm/bin" >> $GITHUB_PATH

      - name: Generate defconfig
        run: |
          set -e
          # For host tools during defconfig generation, ensure libyaml flags are available.
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}"
          
          make -s O=${OBJ_DIR} ARCH=${ARCH} ${CONFIG} \
            HOSTCFLAGS="$(pkg-config --cflags yaml-0.1 2>/dev/null || echo '')" \
            HOST_LDFLAGS="$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml")" \
            -j$(nproc)

      - name: Compile kernel
        run: |
          set -e
          # Setup TARGET CC with ccache if enabled
          if [ "${ENABLE_CCACHE}" = "true" ]; then
            export CC_FOR_TARGET_MAKE="ccache ${{ env.CC }}" # env.CC is 'clang'
          else
            export CC_FOR_TARGET_MAKE="${{ env.CC }}"
          fi

          # For host tools like dtc, ensure libyaml flags are available.
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}"

          make O=${OBJ_DIR} ARCH=${ARCH} \
            LLVM=1 \
            LLVM_IAS=1 \
            BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} \
            BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY} \
            CC="${CC_FOR_TARGET_MAKE}" \
            CLANG_TRIPLE=${CLANG_TRIPLE} \
            CROSS_COMPILE=${CROSS_COMPILE} \
            CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
            LD=${LD} \
            AR=${AR} \
            NM=${NM} \
            OBJCOPY=${OBJCOPY} \
            OBJDUMP=${OBJDUMP} \
            READELF=${READELF} \
            OBJSIZE=${OBJSIZE} \
            STRIP=${STRIP} \
            LDGOLD=${LDGOLD} \
            LLVM_AR=${LLVM_AR} \
            LLVM_DIS=${LLVM_DIS} \
            HOSTCFLAGS="$(pkg-config --cflags yaml-0.1 2>/dev/null || echo '')" \
            HOST_LDFLAGS="$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml")" \
            V=1 \
            -j$(nproc)

      - name: Report result
        run: |
          if [ -f "${OBJ_DIR}/arch/${ARCH}/boot/Image" ]; then
            echo "✅ Kernel built successfully."
            echo "Kernel image: ${OBJ_DIR}/arch/${ARCH}/boot/Image"
            ls -lh "${OBJ_DIR}/arch/${ARCH}/boot/" # List contents for verification
          elif [ -f "${OBJ_DIR}/arch/${ARCH}/boot/Image.gz" ]; then # Check for Image.gz too
            echo "✅ Kernel built successfully (Image.gz)."
            echo "Kernel image: ${OBJ_DIR}/arch/${ARCH}/boot/Image.gz"
            ls -lh "${OBJ_DIR}/arch/${ARCH}/boot/"
          else
            echo "❌ Build failed: Kernel Image not found in ${OBJ_DIR}/arch/${ARCH}/boot/" >&2
            ls -lR "${OBJ_DIR}" # List output directory for debugging
            exit 1
          fi
