name: Build and Package Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CONFIG_FILE: rmx3261_defconfig
      ARCH: arm64
      KBUILD_BUILD_HOST: clhexftw
      KBUILD_BUILD_USER: home
      CLANG_DIR: ${{ runner.home }}/tc/clang-r498229b
      CCACHE_DIR: ${{ runner.tool_cache }}/ccache
      ANYKERNEL_DIR: ${{ runner.home }}/anykernel

    steps:
      - name: Cache ccache
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.c', '**/*.h') }}

      - name: Checkout source
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Ensure clang toolchain
        run: |
          if [ ! -d "$CLANG_DIR" ]; then
            echo "Clang not found: cloning into $CLANG_DIR..."
            git clone -q --depth=1 \
              --single-branch \
              -b '10.0' \
              https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524.git/ \
              "$CLANG_DIR"
          fi

      - name: Set up environment
        run: |
          mkdir -p $CCACHE_DIR
          export PATH="$CLANG_DIR/bin:$PATH"
          export CCACHE="$CCACHE_DIR"
          export PATH="$CCACHE_DIR/bin:$PATH"

      - name: Generate defconfig
        run: |
          mkdir -p out
          echo "########### Generating Defconfig ############"
          make -s ARCH=${{ env.ARCH }} O=out ${CONFIG_FILE} -j$(nproc)

      - name: Compile Kernel
        run: |
          echo "######### Compiling kernel #########"
          make -j$(nproc) \
            O=out \
            ARCH=${{ env.ARCH }} \
            CC="ccache clang" \
            CLANG_TRIPLE="aarch64-linux-gnu-" \
            CROSS_COMPILE="aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="arm-linux-gnueabi-" \
            LLVM=1 \
            LLVM_IAS=1

      - name: Package build
        run: |
          echo "######## Packaging ########"
          cd out
          git clone -q https://github.com/clhexftw/AnyKernel3 -b master $ANYKERNEL_DIR
          mv arch/arm64/boot/Image arch/arm64/boot/dtbo.img $ANYKERNEL_DIR
          cd $ANYKERNEL_DIR
          find . -name "*.zip" -delete
          zip -r AnyKernel.zip *
          timestamp=$(date +"%d%m%Y-%H%M")
          artifact_name="RectiliaEX+KSU-vayu-${timestamp}.zip"
          mv AnyKernel.zip "${artifact_name}"
          echo "Packaged: $artifact_name"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: kernel-package
          path: ${{ env.ANYKERNEL_DIR }}/RectiliaEX+KSU-vayu-*.zip
