name: Build Kernel

on:
  push:
    branches:
      - main # Or your default branch
  workflow_dispatch: # Allows manual triggering

jobs:
  build_kernel:
    name: Build Kernel (rmx3261)
    runs-on: ubuntu-latest

    env:
      KERNEL_DIR: ${{ github.workspace }}
      OBJ_DIR: ${{ github.workspace }}/out
      # ANYKERNEL_DIR is removed as it's not needed
      CLANG_DIR_NAME: clang-r498229b # This was from your original script, but your workflow used clang-6573524. I'll use the one from your workflow template.
      CLANG_REPO_URL: https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524.git
      CLANG_REPO_BRANCH: '10.0'
      CONFIG_FILE: rmx3261_defconfig # Your defconfig file name
      ARCH: arm64
      KBUILD_BUILD_HOST: clhexftw
      KBUILD_BUILD_USER: home
      KERNEL_NAME_PREFIX: "RectiliaEX+KSU-vayu" # Or adjust if "vayu" is not relevant for rmx3261

    steps:
      - name: Checkout Kernel Sources
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # If you use submodules

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libncurses-dev \
            llvm lld

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache
        run: |
          ccache -M 5G # Set ccache size to 5GB
          ccache -z   # Zero ccache statistics

      - name: Setup Clang Toolchain
        uses: actions/cache@v4
        id: clang-cache
        with:
          path: ${{ github.workspace }}/clang-toolchain # Renamed for clarity, matches path in next step
          key: ${{ runner.os }}-clang-${{ env.CLANG_REPO_URL }}-${{ env.CLANG_REPO_BRANCH }}
      
      - name: Clone Clang Toolchain (if not cached)
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          echo "Clang toolchain not found in cache. Cloning..."
          git clone --depth=1 --single-branch -q ${{ env.CLANG_REPO_URL }} -b ${{ env.CLANG_REPO_BRANCH }} ${{ github.workspace }}/clang-toolchain
        
      - name: Add Clang to PATH
        run: |
          echo "${{ github.workspace }}/clang-toolchain/bin" >> $GITHUB_PATH

      - name: Set Dynamic Variables
        id: vars
        run: |
          echo "ZIP_NAME=${{ env.KERNEL_NAME_PREFIX }}-${{ env.CONFIG_FILE%.*_defconfig}}-$(date +'%d%m%Y-%H%M').zip" >> $GITHUB_ENV
          echo "ZIMAGE_PATH=${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/Image" >> $GITHUB_ENV
          echo "DTBO_PATH=${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img" >> $GITHUB_ENV
          # Add other common kernel outputs you might want to check or package
          echo "IMAGE_GZ_DTB_PATH=${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz-dtb" >> $GITHUB_ENV
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Generate Defconfig
        run: |
          echo "########### Generating Defconfig ############"
          make -s O=${{ env.OBJ_DIR }} ARCH=${{ env.ARCH }} ${{ env.CONFIG_FILE }} -j$(nproc --all)

      - name: Compile Kernel
        run: |
          echo "######### Compiling kernel #########"
          make -j$(nproc --all) \
            O=${{ env.OBJ_DIR }} \
            ARCH=${{ env.ARCH }} \
            CC="ccache clang" \
            CLANG_TRIPLE="aarch64-linux-gnu-" \
            CROSS_COMPILE="aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="arm-linux-gnueabi-" \
            LLVM=1 \
            LLVM_IAS=1

      - name: Check if Kernel Outputs Exist
        id: check_files
        run: |
          # Primarily check for Image and dtbo.img as per your original script's focus
          # You might also check for Image.gz-dtb if your device needs it
          if [[ -f "${{ env.ZIMAGE_PATH }}" && -f "${{ env.DTBO_PATH }}" ]]; then
            echo "Kernel Image and DTBO found."
            echo "files_exist=true" >> $GITHUB_OUTPUT
          else
            echo "Required kernel output(s) (Image and/or dtbo.img) not found!"
            echo "Image exists: $(test -f "${{ env.ZIMAGE_PATH }}" && echo true || echo false)"
            echo "DTBO exists: $(test -f "${{ env.DTBO_PATH }}" && echo true || echo false)"
            echo "files_exist=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Package Kernel Outputs
        if: steps.check_files.outputs.files_exist == 'true'
        run: |
          echo "Creating ZIP archive of kernel outputs..."
          cd ${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/
          
          # List of files to include in the zip. Adjust as needed.
          files_to_zip=""
          if [ -f "Image" ]; then files_to_zip="$files_to_zip Image"; fi
          if [ -f "dtbo.img" ]; then files_to_zip="$files_to_zip dtbo.img"; fi
          if [ -f "Image.gz-dtb" ]; then files_to_zip="$files_to_zip Image.gz-dtb"; fi
          # Add any other files you want to package, e.g., dtb.img or specific .dtb files
          # if [ -f "dtb.img" ]; then files_to_zip="$files_to_zip dtb.img"; fi

          if [ -z "$files_to_zip" ]; then
            echo "No kernel files found to zip in ${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/"
            exit 1
          fi
          
          zip -r9 ${{ github.workspace }}/${{ env.ZIP_NAME }} $files_to_zip
          
          cd ${{ env.KERNEL_DIR }} # Go back to workspace root
          echo "FINAL_ZIP_PATH=${{ github.workspace }}/${{ env.ZIP_NAME }}" >> $GITHUB_ENV
          echo "Created zip: ${{ env.ZIP_NAME }}"

      - name: Upload to free.keep.sh
        if: success() && steps.check_files.outputs.files_exist == 'true' && env.FINAL_ZIP_PATH
        run: |
          echo "Uploading ${{ env.ZIP_NAME }} to free.keep.sh..."
          curl --upload-file ${{ env.FINAL_ZIP_PATH }} https://free.keep.sh
          echo # Newline after curl output

      - name: Upload Kernel Zip as Artifact
        if: success() && steps.check_files.outputs.files_exist == 'true' && env.FINAL_ZIP_PATH
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.FINAL_ZIP_PATH }}

      - name: Print ccache statistics
        if: always()
        run: ccache -s

      - name: Finalizing and Displaying Build Time
        if: always() # Run this step even if previous ones fail, to see the time
        run: |
          END_TIME=$(date +%s)
          DIFF=$(($END_TIME - ${{ env.START_TIME }}))
          echo "Build completed in $(($DIFF / 60)) minute(s) and $(($DIFF % 60)) second(s)."
          if [[ "${{ steps.check_files.outputs.files_exist }}" == "true" && "${{ job.status }}" == "success" ]]; then
            echo "############################################"
            echo "############# OkThisIsEpic!  ##############"
            echo "############################################"
          else
            echo "############################################"
            echo "##         This Is Not Epic :'(           ##"
            echo "############################################"
            # Ensure the job fails if files weren't found or packaging failed leading to no FINAL_ZIP_PATH
            if [[ "${{ steps.check_files.outputs.files_exist }}" != "true" || -z "${{ env.FINAL_ZIP_PATH }}" ]]; then
              exit 1
            fi
          fi
