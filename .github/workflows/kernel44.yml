name: Build Kernel

on:
  push:
    branches:
      - main # Or your default branch
  workflow_dispatch: # Allows manual triggering

jobs:
  build_kernel:
    name: Build Kernel for Vayu
    runs-on: ubuntu-latest

    env:
      KERNEL_DIR: ${{ github.workspace }}
      OBJ_DIR: ${{ github.workspace }}/out
      ANYKERNEL_DIR: ${{ github.workspace }}/AnyKernel3_tmp # Temporary AnyKernel clone
      CLANG_DIR_NAME: clang-r498229b
      CLANG_REPO_URL: https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524.git
      CLANG_REPO_BRANCH: '10.0'
      CONFIG_FILE: rmx3261_defconfig # Your defconfig file name
      ARCH: arm64
      KBUILD_BUILD_HOST: clhexftw
      KBUILD_BUILD_USER: home
      KERNEL_NAME_PREFIX: "RectiliaEX+KSU-vayu"

    steps:
      - name: Checkout Kernel Sources
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # If you use submodules

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libncurses-dev \
            llvm lld

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache
        run: |
          ccache -M 5G # Set ccache size to 5GB
          ccache -z   # Zero ccache statistics

      - name: Setup Clang Toolchain
        uses: actions/cache@v4
        id: clang-cache # Give an id to check cache hit later
        with:
          path: ${{ github.workspace }}/${{ env.CLANG_DIR_NAME }}
          key: ${{ runner.os }}-clang-${{ env.CLANG_DIR_NAME }}-${{ env.CLANG_REPO_BRANCH }}
      
      - name: Clone Clang Toolchain (if not cached)
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          echo "Clang toolchain not found in cache. Cloning..."
          git clone --depth=1 --single-branch -q ${{ env.CLANG_REPO_URL }} -b ${{ env.CLANG_REPO_BRANCH }} ${{ github.workspace }}/${{ env.CLANG_DIR_NAME }}
        
      - name: Add Clang to PATH
        run: |
          echo "${{ github.workspace }}/${{ env.CLANG_DIR_NAME }}/bin" >> $GITHUB_PATH

      - name: Set Dynamic Variables
        id: vars
        run: |
          echo "ZIP_NAME=${{ env.KERNEL_NAME_PREFIX }}-$(date +'%d%m%Y-%H%M').zip" >> $GITHUB_ENV
          echo "ZIMAGE_PATH=${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/Image" >> $GITHUB_ENV
          echo "DTBO_PATH=${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img" >> $GITHUB_ENV
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Generate Defconfig
        run: |
          echo "########### Generating Defconfig ############"
          make -s O=${{ env.OBJ_DIR }} ARCH=${{ env.ARCH }} ${{ env.CONFIG_FILE }} -j$(nproc --all)

      - name: Compile Kernel
        run: |
          echo "######### Compiling kernel #########"
          make -j$(nproc --all) \
            O=${{ env.OBJ_DIR }} \
            ARCH=${{ env.ARCH }} \
            CC="ccache clang" \
            CLANG_TRIPLE="aarch64-linux-gnu-" \
            CROSS_COMPILE="aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="arm-linux-gnueabi-" \
            LLVM=1 \
            LLVM_IAS=1

      - name: Check if Kernel Image and DTBO exist
        id: check_files
        run: |
          if [[ -f "${{ env.ZIMAGE_PATH }}" && -f "${{ env.DTBO_PATH }}" ]]; then
            echo "Kernel Image and DTBO found."
            echo "files_exist=true" >> $GITHUB_OUTPUT
          else
            echo "Kernel Image or DTBO not found!"
            echo "files_exist=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Package Kernel with AnyKernel3
        if: steps.check_files.outputs.files_exist == 'true'
        run: |
          echo "Cloning AnyKernel3..."
          git clone -q https://github.com/clhexftw/AnyKernel3 -b master ${{ env.ANYKERNEL_DIR }}

          echo "Copying kernel files to AnyKernel3 directory..."
          cp -f ${{ env.ZIMAGE_PATH }} ${{ env.ANYKERNEL_DIR }}/Image
          cp -f ${{ env.DTBO_PATH }} ${{ env.ANYKERNEL_DIR }}/dtbo.img
          # If you have other files like Image.gz-dtb, add them here:
          # cp -f ${{ env.OBJ_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz-dtb ${{ env.ANYKERNEL_DIR }}/ # Example

          echo "Zipping AnyKernel3 package..."
          cd ${{ env.ANYKERNEL_DIR }}
          zip -r9 ${{ env.ZIP_NAME }} * -x ".git*" -x "README.md" -x "*placeholder"
          cd ${{ env.KERNEL_DIR }} # Go back to kernel dir for consistency
          mv ${{ env.ANYKERNEL_DIR }}/${{ env.ZIP_NAME }} ${{ github.workspace }}/${{ env.ZIP_NAME }}
          echo "FINAL_ZIP_PATH=${{ github.workspace }}/${{ env.ZIP_NAME }}" >> $GITHUB_ENV
          
          echo "Cleaning up AnyKernel3 clone..."
          rm -rf ${{ env.ANYKERNEL_DIR }}

      - name: Upload to free.keep.sh
        if: steps.check_files.outputs.files_exist == 'true'
        run: |
          echo "Uploading ${{ env.ZIP_NAME }} to free.keep.sh..."
          curl --upload-file ${{ env.FINAL_ZIP_PATH }} https://free.keep.sh
          echo # Newline after curl output

      - name: Upload Kernel Zip as Artifact
        if: steps.check_files.outputs.files_exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.FINAL_ZIP_PATH }}

      - name: Print ccache statistics
        run: ccache -s

      - name: Finalizing and Displaying Build Time
        if: always() # Run this step even if previous ones fail, to see the time
        run: |
          END_TIME=$(date +%s)
          DIFF=$(($END_TIME - ${{ env.START_TIME }}))
          echo "Build completed in $(($DIFF / 60)) minute(s) and $(($DIFF % 60)) second(s)."
          if [[ "${{ steps.check_files.outputs.files_exist }}" == "true" && "${{ job.status }}" == "success" ]]; then
            echo "############################################"
            echo "############# OkThisIsEpic!  ##############"
            echo "############################################"
          else
            echo "############################################"
            echo "##         This Is Not Epic :'(           ##"
            echo "############################################"
            exit 1 # Ensure the job fails if packaging failed
          fi
