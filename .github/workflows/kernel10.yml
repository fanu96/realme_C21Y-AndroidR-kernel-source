name: Build Kernel & Modules (Stripped & Compressed) for Realme C21Y

on:
  workflow_dispatch:

env:
  KERNEL_ARCH: arm64
  MODULES_STAGING_PATH: ${{ github.workspace }}/modules_staging
  ARTIFACT_DIR: ${{ github.workspace }}/artifact

  # Toolchain repos & refs
  CLANG_REPO: https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524
  CLANG_REF: 10.0
  GCC_AARCH64_REPO: https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9
  GCC_AARCH64_REF: lineage-19.1
  GCC_ARM_REPO: https://github.com/rifsxd/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9
  GCC_ARM_REF: lineage-19.1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📜 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          path: kernel_source

      - name: ⚡ Cache Clang Toolchain
        id: cache-clang
        uses: actions/cache@v3
        with:
          path: clang
          key: clang-${{ env.CLANG_REF }}

      - name: ⚡ Cache GCC AArch64 Toolchain
        id: cache-gcc-aarch64
        uses: actions/cache@v3
        with:
          path: gcc-aarch64
          key: gcc-aarch64-${{ env.GCC_AARCH64_REF }}

      - name: ⚡ Cache GCC ARM Toolchain
        id: cache-gcc-arm
        uses: actions/cache@v3
        with:
          path: gcc-arm
          key: gcc-arm-${{ env.GCC_ARM_REF }}

      - name: ⚡ Cache Kernel Build Output
        id: cache-build
        uses: actions/cache@v3
        with:
          path: kernel_source/out
          key: build-${{ hashFiles('kernel_source/stock_kernel.config') }}-${{ github.sha }}
          restore-keys: |
            build-${{ hashFiles('kernel_source/stock_kernel.config') }}-
            build-

      - name: 🔧 Install Build Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio \
            crossbuild-essential-arm64 \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            lsb-release make python3 rsync wget zip unzip \
            libyaml-dev

      - name: 📥 Download Clang Toolchain
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch $CLANG_REF $CLANG_REPO clang
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH

      - name: 📥 Download GCC Toolchains
        if: steps.cache-gcc-aarch64.outputs.cache-hit != 'true' || steps.cache-gcc-arm.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b $GCC_AARCH64_REF $GCC_AARCH64_REPO gcc-aarch64
          echo "${{ github.workspace }}/gcc-aarch64/bin" >> $GITHUB_PATH
          git clone --depth=1 -b $GCC_ARM_REF $GCC_ARM_REPO gcc-arm
          echo "${{ github.workspace }}/gcc-arm/bin" >> $GITHUB_PATH

      - name: 🔍 Verify Toolchains in PATH
        run: |
          which clang            || { echo "ERROR: clang not found"; exit 1; }
          which aarch64-linux-android-gcc || { echo "ERROR: aarch64 gcc not found"; exit 1; }
          which arm-linux-androideabi-gcc  || { echo "ERROR: arm32 gcc not found"; exit 1; }
          clang --version
          aarch64-linux-android-gcc --version
          arm-linux-androideabi-gcc --version

      - name: 🚀 Build Kernel + Modules & Install
        id: build_step
        working-directory: kernel_source
        run: |
          export ARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-android-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export READELF=llvm-readelf
          export STRIP=llvm-strip
          export BSP_BUILD_ANDROID_OS=y
          export BSP_BUILD_FAMILY=qogirl6
          export LLVM_AR=llvm-ar
          export LLVM_NM=llvm-nm
          export LLVM_DIS=llvm-dis
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}
          YAML_LIBS=$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml -L/usr/lib/x86_64-linux-gnu")
          export HOST_LDFLAGS="$YAML_LIBS"

          mkdir -p out
          cp stock_kernel.config out/.config
          make O=out ARCH=${ARCH} CC=${CC} CLANG_TRIPLE=${CLANG_TRIPLE} \
               CROSS_COMPILE=${CROSS_COMPILE} CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
               LD=${LD} AR=${AR} NM=${NM} OBJCOPY=${OBJCOPY} OBJDUMP=${OBJDUMP} \
               READELF=${READELF} STRIP=${STRIP} BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} \
               BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY} HOST_LDFLAGS="${HOST_LDFLAGS}" \
               olddefconfig

          make O=out -j$(nproc) V=1 ARCH=${ARCH} CC=${CC} CLANG_TRIPLE=${CLANG_TRIPLE} \
               CROSS_COMPILE=${CROSS_COMPILE} CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} \
               LD=${LD} AR=${AR} NM=${NM} OBJCOPY=${OBJCOPY} OBJDUMP=${OBJDUMP} \
               READELF=${READELF} STRIP=${STRIP} BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} \
               BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY} HOST_LDFLAGS="${HOST_LDFLAGS}" \
               Image.gz dtbs modules

          rm -rf "${MODULES_STAGING_PATH}"
          make O=out ARCH=${ARCH} INSTALL_MOD_PATH="${MODULES_STAGING_PATH}" \
               CC=${CC} CLANG_TRIPLE=${CLANG_TRIPLE} CROSS_COMPILE=${CROSS_COMPILE} \
               CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32} LD=${LD} AR=${AR} \
               NM=${NM} OBJCOPY=${OBJCOPY} OBJDUMP=${OBJDUMP} READELF=${READELF} \
               STRIP=${STRIP} BSP_BUILD_ANDROID_OS=${BSP_BUILD_ANDROID_OS} \
               BSP_BUILD_FAMILY=${BSP_BUILD_FAMILY} HOST_LDFLAGS="${HOST_LDFLAGS}" \
               modules_install

          KVER_DIR=$(find "${MODULES_STAGING_PATH}/lib/modules/" -mindepth 1 -maxdepth 1 -type d | head -n1)
          KVER=$(basename "${KVER_DIR}")
          if [ -d "$KVER_DIR/kernel" ] && [ -n "$(find "$KVER_DIR/kernel" -name '*.ko' -print -quit)" ]; then
            depmod -a -b "${MODULES_STAGING_PATH}" "$KVER"
            find "$KVER_DIR/kernel" -name '*.ko' -exec ${STRIP} --strip-unneeded {} +
          fi

          IMAGE=out/arch/${ARCH}/boot/Image.gz
          [ -f "$IMAGE" ] || { echo "❌ $IMAGE missing"; exit 1; }

          echo "kernel_version=$KVER" >> $GITHUB_OUTPUT

      - name: 📦 Prepare Artifacts
        id: prep_artifacts
        run: |
          mkdir -p $ARTIFACT_DIR
          cp kernel_source/out/arch/${KERNEL_ARCH}/boot/Image.gz $ARTIFACT_DIR/
          mkdir -p $ARTIFACT_DIR/dtbs
          find kernel_source/out/arch/${KERNEL_ARCH}/boot/dts -name '*.dtb' -exec cp --parents {} $ARTIFACT_DIR/dtbs/ \;
          if [ -n "${{ steps.build_step.outputs.kernel_version }}" ]; then
            tar czf $ARTIFACT_DIR/modules-${{ steps.build_step.outputs.kernel_version }}.tar.gz \
              -C $MODULES_STAGING_PATH lib/modules/${{ steps.build_step.outputs.kernel_version }}
          fi

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.KERNEL_ARCH }}-modules-${{ github.run_id }}
          path: |
            ${{ env.ARTIFACT_DIR }}/Image.gz
            ${{ env.ARTIFACT_DIR }}/dtbs/**
            ${{ env.ARTIFACT_DIR }}/modules-*.tar.gz
