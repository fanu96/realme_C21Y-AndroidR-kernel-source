name: Build Kernel for Realme C21Y (RMX3261/RMX3263)

on:
  workflow_dispatch: # manual trigger

env:
  KERNEL_DEFCONFIG: sprd_sharkl5Pro_defconfig
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Ensure our clang binary and wrapper scripts are in PATH for all steps
      PATH: ${{ github.workspace }}/clang/bin:${{ env.PATH }}

    steps:
      - name: 📜 Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel_source

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            make python3 rsync wget zip unzip \
            xz-utils libyaml-dev pkg-config

      - name: 📥 Download Android Clang Toolchain
        run: |
          echo "Downloading Android Clang (6573524 based on r383902b) 11.0.2..."
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang
          echo "Clang toolchain is ready"

      - name: 🚀 Build Kernel & DTBs
        working-directory: kernel_source
        run: |
          echo "Using $(which clang) for host compilation"
          clang --version

          # YAML flags for scripts/dtc
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          export YAML_CFLAGS=$(pkg-config --cflags yaml-0.1)
          export YAML_LIBS=$(pkg-config --libs yaml-0.1)

          # Core environment
          export ARCH=${ARCH}
          export KBUILD_BUILD_USER="GitHubActions"
          export KBUILD_BUILD_HOST="github.com"

          # Target compiler (clang with aarch64 triple)
          export CC=aarch64-linux-gnu-clang
          export CXX=aarch64-linux-gnu-clang++
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export READELF=llvm-readelf
          export LLVM=1
          export LLVM_IAS=1

          # Host compiler for building tools
          export HOSTCC=clang
          export HOSTCXX=clang++

          # Cross-prefix for modules, etc
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Generate defconfig
          echo "Applying defconfig: ${KERNEL_DEFCONFIG}"
          make O=out ARCH=${ARCH} CC=${CC} HOSTCC=${HOSTCC} ${KERNEL_DEFCONFIG}

          # Build kernel image + DTBs
          echo "Building kernel and DTBs on $(nproc) threads"
          make -j$(nproc) O=out \
               CC=${CC} CXX=${CXX} \
               HOSTCC=${HOSTCC} HOSTCXX=${HOSTCXX} \
               Image.gz dtbs

          # Verify
          if [ ! -f out/arch/${ARCH}/boot/Image.gz ]; then
            echo "❌ Kernel build failed"
            exit 1
          fi
          echo "✅ Build succeeded"

      - name: 📦 Prepare Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifact
          cp kernel_source/out/arch/${{ env.ARCH }}/boot/Image.gz $GITHUB_WORKSPACE/artifact/
          cp kernel_source/out/arch/${{ env.ARCH }}/boot/dts/*.dtb $GITHUB_WORKSPACE/artifact/ || true

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.run_id }}
          path: ${{ github.workspace }}/artifact/*
          if-no-files-found: error
