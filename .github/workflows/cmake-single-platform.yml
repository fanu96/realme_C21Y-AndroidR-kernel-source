name: Build Kernel for Realme C21Y (RMX3261/RMX3263)

on:
  workflow_dispatch: # manual trigger
  push:
    branches: [main]

env:
  KERNEL_DEFCONFIG: sprd_sharkl5Pro_defconfig
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📜 Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: <your-kernel-repo> # Specify Realme C21Y kernel source
          ref: <branch-or-tag> # Specify branch or commit (e.g., android-11.0)
          path: kernel_source

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            make python3 rsync wget zip unzip \
            xz-utils libyaml-dev pkg-config

      - name: 📥 Download Android Clang Toolchain & Set PATH
        run: |
          echo "Downloading Android (6573524 based on r383902b) Clang 11.0.2 toolchain..."
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
          echo "Clang toolchain bin directory added to GITHUB_PATH."

      - name: 🔍 Verify Clang Version
        run: |
          clang --version | grep "clang version 11.0.2" || { echo "Clang version mismatch!"; exit 1; }

      - name: 🚀 Build Kernel & DTBs
        working-directory: kernel_source
        run: |
          echo "Using clang from: $(which clang)"
          clang --version

          # YAML linking fix
          if command -v pkg-config &> /dev/null; then
              export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}
              YAML_LIBS=$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml")
              if [ "$YAML_LIBS" != "-lyaml" ]; then
                  echo "Using pkg-config resolved YAML libs: $YAML_LIBS"
              else
                  echo "pkg-config failed to resolve yaml-0.1, falling back to -lyaml"
                  YAML_LIBS="-lyaml -L/usr/lib/x86_64-linux-gnu"
              fi
          else
              echo "pkg-config not found, using fallback -lyaml with explicit library path"
              YAML_LIBS="-lyaml -L/usr/lib/x86_64-linux-gnu"
          fi
          export HOSTLDFLAGS="$YAML_LIBS"
          echo "Using HOSTLDFLAGS: ${HOSTLDFLAGS}"

          # Build environment
          export ARCH=${{ env.ARCH }}
          export KBUILD_BUILD_USER="GitHubActions"
          export KBUILD_BUILD_HOST="github.com"
          export CC=clang
          export CXX=clang++
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export READELF=llvm-readelf
          export LLVM=1
          export LLVM_IAS=1
          export HOSTCC=clang
          export HOSTCXX=clang++
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Generate defconfig
          echo "Using defconfig: ${{ env.KERNEL_DEFCONFIG }}"
          make O=out ${KERNEL_DEFCONFIG}

          # Build kernel + DTBs
          echo "Building Image.gz + DTBs with $(nproc) threads..."
          make -j$(nproc) O=out Image.gz dtbs

          # Verify output
          IMAGE=out/arch/${ARCH}/boot/Image.gz
          if [ ! -f "${IMAGE}" ]; then
            echo "❌ Build failed: ${IMAGE} not found"
            exit 1
          fi
          echo "✅ Build succeeded!"

      - name: 📦 Prepare Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifact
          cp kernel_source/out/arch/${{ env.ARCH }}/boot/Image.gz $GITHUB_WORKSPACE/artifact/
          DTB_COUNT=$(find kernel_source/out/arch/${{ env.ARCH }}/boot/dts/ -type f -name '*.dtb' -exec cp {} $GITHUB_WORKSPACE/artifact/ \; | wc -l)
          if [ "$DTB_COUNT" -eq 0 ]; then
            echo "⚠️ Warning: No DTB files found in out/arch/${{ env.ARCH }}/boot/dts/"
          fi
          echo "Artifacts prepared:"
          ls -l $GITHUB_WORKSPACE/artifact

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-realme-c21y-${{ env.KERNEL_DEFCONFIG }}-${{ github.run_id }}
          path: ${{ github.workspace }}/artifact/*
          if-no-files-found: error
