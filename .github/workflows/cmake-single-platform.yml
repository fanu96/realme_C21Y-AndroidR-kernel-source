name: Build Kernel for Realme C21Y (RMX3261/RMX3263)

on:
  workflow_dispatch: # manual trigger

env:
  KERNEL_DEFCONFIG: sprd_sharkl5Pro_defconfig
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📜 Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel_source

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            make python3 rsync wget zip unzip \
            xz-utils libyaml-dev pkg-config

      - name: 📥 Download Android Clang Toolchain
        run: |
          echo "Downloading Android Clang (6573524 based on r383902b) 11.0.2..."
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
          echo "Clang toolchain directory added to PATH"

      - name: 🚀 Build Kernel & DTBs
        working-directory: kernel_source
        run: |
          # Verify host clang is our downloaded version
          echo "Using clang: $(which clang)"
          clang --version

          # YAML flags for DTC
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          export YAML_LIBS=$(pkg-config --libs yaml-0.1)
          export HOSTLDFLAGS+="$YAML_LIBS"

          # Core build env
          export ARCH=${ARCH}
          export KBUILD_BUILD_USER="GitHubActions"
          export KBUILD_BUILD_HOST="github.com"

          # Use clang for target and host
          export CC=clang
          export CXX=clang++
          export HOSTCC=clang
          export HOSTCXX=clang++
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export READELF=llvm-readelf
          export LLVM=1
          export LLVM_IAS=1

          # Cross-compile prefixes
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Generate defconfig
          echo "Applying defconfig: ${KERNEL_DEFCONFIG}"
          make O=out ${KERNEL_DEFCONFIG}

          # Build kernel + DTBs
          echo "Building Image.gz + DTBs with $(nproc) threads..."
          make -j$(nproc) O=out Image.gz dtbs

          # Verify output
          if [ ! -f out/arch/${ARCH}/boot/Image.gz ]; then
            echo "❌ Build failed: Image.gz not found"
            exit 1
          fi
          echo "✅ Build succeeded"

      - name: 📦 Prepare Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifact
          cp kernel_source/out/arch/${{ env.ARCH }}/boot/Image.gz $GITHUB_WORKSPACE/artifact/
          find kernel_source/out/arch/${{ env.ARCH }}/boot/dts/ -name '*.dtb' -exec cp {} $GITHUB_WORKSPACE/artifact/ \; || true
          ls -l $GITHUB_WORKSPACE/artifact

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.run_id }}
          path: ${{ github.workspace }}/artifact/*
          if-no-files-found: error
