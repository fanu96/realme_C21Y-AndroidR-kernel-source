name: Build Kernel for Realme C21Y (RMX3261/RMX3263)

on:
  workflow_dispatch: # manual trigger

env:
  # Workflow-level env vars
  KERNEL_DEFCONFIG: sprd_sharkl5Pro_defconfig
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📜 Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel_source

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            make python3 rsync wget zip unzip \
            xz-utils libyaml-dev pkg-config

      - name: 📥 Download Android Clang Toolchain & Set PATH
        run: |
          echo "Downloading Android Clang (6573524 based on r383902b) 11.0.2..."
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: 🚀 Build Kernel & DTBs
        working-directory: kernel_source
        run: |
          # Verify clang
          echo "Host clang: $(which clang)"
          clang --version

          # YAML libs for dtc
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          YAML_LIBS=$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml")
          export HOST_LDFLAGS="$YAML_LIBS"
          echo "HOST_LDFLAGS=$HOST_LDFLAGS"

          # Core env
          export ARCH=${ARCH}
          export KBUILD_BUILD_USER="GitHubActions"
          export KBUILD_BUILD_HOST="github.com"

          # Target compilation uses clang wrapper
          export CC=aarch64-linux-gnu-clang
          export CXX=aarch64-linux-gnu-clang++
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export READELF=llvm-readelf
          export LLVM=1
          export LLVM_IAS=1

          # Host tools compilation
          export HOSTCC=clang
          export HOSTCXX=clang++

          # Cross prefixes
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Defconfig
          echo "Using defconfig: ${{ env.KERNEL_DEFCONFIG }}"
          make O=out ${{ env.KERNEL_DEFCONFIG }}

          # Build
          echo "Building Image.gz + DTBs with $(nproc) threads..."
          make -j$(nproc) O=out \
               CC=${CC} CXX=${CXX} \
               HOSTCC=${HOSTCC} HOSTCXX=${HOSTCXX} \
               Image.gz dtbs

          # Verify
          if [ ! -f out/arch/${ARCH}/boot/Image.gz ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ Build succeeded"

      - name: 📦 Prepare Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifact
          cp out/arch/${{ env.ARCH }}/boot/Image.gz $GITHUB_WORKSPACE/artifact/
          find out/arch/${{ env.ARCH }}/boot/dts/ -name '*.dtb' -exec cp {} $GITHUB_WORKSPACE/artifact/ \;
          ls -l $GITHUB_WORKSPACE/artifact

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.run_id }}
          path: ${{ github.workspace }}/artifact/*
          if-no-files-found: error
