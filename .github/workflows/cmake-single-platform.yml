name: Build Android Kernel

on:
  push:
    branches: master
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    env:
      DEFCONFIG: sprd_sharkl5Pro_defconfig
      KERNEL_ARCH: arm64
      CLANG_VERSION: clang-r383902b

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v3
      with:
        path: source/msm-5.4

    - name: Set up directories
      run: |
        mkdir -p ~/workspace/source/prebuilts
        mkdir -p ~/workspace/source/kernel_out

    - name: Clone prebuilt tools
      run: |
        cd ~/workspace/source/prebuilts
        git clone https://android.googlesource.com/platform/prebuilts/build-tools
        git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9

    - name: Export environment variables
      run: |
        echo "SOURCE_ROOT=$HOME/workspace/source" >> $GITHUB_ENV
        echo "MAKE_PATH=$HOME/workspace/source/prebuilts/build-tools/linux-x86/bin/" >> $GITHUB_ENV
        echo "CROSS_COMPILE=$HOME/workspace/source/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin/aarch64-linux-android-" >> $GITHUB_ENV
        echo "KERNEL_DIR=$GITHUB_WORKSPACE/source/msm-5.4" >> $GITHUB_ENV
        echo "KERNEL_OUT=$HOME/workspace/source/kernel_out" >> $GITHUB_ENV
        echo "KERNEL_SRC=$HOME/workspace/source/kernel_out" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "OUT_DIR=$HOME/workspace/source/kernel_out" >> $GITHUB_ENV
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "PATH=$HOME/workspace/source/prebuilts/clang/host/linux-x86/${{ env.CLANG_VERSION }}/bin:$PATH" >> $GITHUB_ENV

    - name: Build Kernel (defconfig)
      run: |
        cd $KERNEL_DIR
        $MAKE_PATH/make O=$OUT_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE \
          HOSTCC=$HOME/workspace/source/prebuilts/clang/host/linux-x86/${CLANG_VERSION}/bin/clang \
          CC=$HOME/workspace/source/prebuilts/clang/host/linux-x86/${CLANG_VERSION}/bin/clang \
          LLVM=$HOME/workspace/source/prebuilts/clang/host/linux-x86/${CLANG_VERSION}/bin/clang \
          $DEFCONFIG

    - name: Build Kernel (Image & DTBs)
      run: |
        cd $OUT_DIR
        $MAKE_PATH/make -j$(nproc) O=$OUT_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE \
          HOSTCC=$HOME/workspace/source/prebuilts/clang/host/linux-x86/${CLANG_VERSION}/bin/clang \
          CC=$HOME/workspace/source/prebuilts/clang/host/linux-x86/${CLANG_VERSION}/bin/clang \
          LLVM=$HOME/workspace/source/prebuilts/clang/host/linux-x86/${CLANG_VERSION}/bin/clang
