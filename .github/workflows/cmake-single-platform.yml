name: Build Kernel for Realme C21Y (RMX3261/RMX3263)

on:
  workflow_dispatch: # Allows manual triggering

env:
  KERNEL_DEFCONFIG: sprd_sharkl5Pro_defconfig
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📜 Checkout kernel source
      uses: actions/checkout@v4
      with:
        path: kernel_source

    - name: 🔧 Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
          flex git kmod libelf-dev libncurses5-dev libssl-dev \
          make python3 rsync wget zip unzip \
          libyaml-dev pkg-config xz-utils

    - name: 📥 Download Clang Toolchain
      run: |
        echo "Downloading Android prebuilt Clang 11.0.2 (6573524 based on r383902b)..."
        git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang
        echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
        echo "Host clang from: $(which clang)"
        clang --version

    - name: 🚀 Build Kernel & DTBs
      working-directory: kernel_source
      run: |
        # dtc YAML linking flags
        export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
        export HOSTLDFLAGS=$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml")
        echo "HOSTLDFLAGS=$HOSTLDFLAGS"

        # core env
        export ARCH=${{ env.ARCH }}
        export KBUILD_BUILD_USER="GitHubActions"
        export KBUILD_BUILD_HOST="github.com"

        # use clang as cross-compiler via --target
        export CC="clang --target=aarch64-linux-gnu"
        export CXX="clang++ --target=aarch64-linux-gnu"
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        export READELF=llvm-readelf
        export LLVM=1
        export LLVM_IAS=1

        # host compiler
        export HOSTCC=clang
        export HOSTCXX=clang++

        # generate config
        echo "Generating kernel config ${KERNEL_DEFCONFIG}"
        make O=out ARCH=${ARCH} ${{ env.KERNEL_DEFCONFIG }}

        # disable stack protector
        scripts/config --file out/.config --disable CONFIG_CC_STACKPROTECTOR
        scripts/config --file out/.config --disable CONFIG_CC_STACKPROTECTOR_STRONG

        # build
        echo "Building Image.gz + DTBs with $(nproc) threads..."
        make -j$(nproc) O=out \
             CC="$CC" CXX="$CXX" \
             HOSTCC=$HOSTCC HOSTCXX=$HOSTCXX \
             HOSTLDFLAGS="$HOSTLDFLAGS" \
             Image.gz dtbs

        # verify
        if [ ! -f out/arch/${ARCH}/boot/Image.gz ]; then
          echo "❌ Kernel build failed: Image.gz not found"
          exit 1
        fi
        echo "✅ Kernel build successful"

    - name: 📦 Prepare Artifact
      run: |
        mkdir -p $GITHUB_WORKSPACE/artifact
        cp out/arch/${{ env.ARCH }}/boot/Image.gz $GITHUB_WORKSPACE/artifact/
        find out/arch/${{ env.ARCH }}/boot/dts/ -name '*.dtb' -exec cp {} $GITHUB_WORKSPACE/artifact/ \;
        ls -l $GITHUB_WORKSPACE/artifact

    - name: 📤 Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ github.run_id }}
        path: ${{ github.workspace }}/artifact/*
        if-no-files-found: error
