# .github/workflows/build_kernel.yml

name: Build Kernel (Gzip), Modules, DTBs & vmlinux (olddefconfig - Full LLVM - No Strip - Fixed Warnings)

on:
  workflow_dispatch: # Allows manual triggering

env:
  CUSTOM_CONFIG_FILE: stock_kernel.config # Your config file name (in repo root or kernel_source dir)
  ARCH: arm64
  DTB_SUBPATH: sprd # Subdirectory for DTBs (Verify this path!)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout Kernel Source
    - name: 📜 Checkout kernel source
      uses: actions/checkout@v4
      with:
        path: kernel_source # Checks out into this subdirectory

    # Step 2: Install Dependencies
    - name: 🔧 Install Dependencies
      run: |
        echo "Installing build dependencies..."
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential ca-certificates cpio curl \
          flex git kmod libelf-dev libncurses5-dev libssl-dev \
          lsb-release make python3 rsync wget zip unzip gzip \
          libyaml-dev lz4 \
          libncurses-dev # For menuconfig host tools if needed by Kconfig steps
        echo "Dependencies installed."

    # Step 3: Download and Verify Clang Toolchain
    - name: 📥 Download & Verify Clang Toolchain (Android 6573524 / Clang 11.0.2)
      run: |
        echo "Downloading Android Clang 6573524..."
        git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang --quiet
        CLANG_BIN_DIR="$GITHUB_WORKSPACE/clang/bin"
        CLANG_EXPECTED_VERSION="11.0.2"

        echo "Verifying downloaded toolchain contents..."
        if [ ! -x "$CLANG_BIN_DIR/clang" ] || [ ! -x "$CLANG_BIN_DIR/ld.lld" ]; then
          echo "❌ Critical toolchain components missing!"; ls -l "$CLANG_BIN_DIR"; exit 1;
        fi
        echo "Toolchain executables found."

        echo "Adding downloaded Clang/LLVM binutils to PATH for subsequent steps..."
        echo "$CLANG_BIN_DIR" >> $GITHUB_PATH
        echo "Prepending downloaded Clang/LLVM binutils to PATH for current step..."
        export PATH="$CLANG_BIN_DIR:$PATH"

        echo "--- Verifying effective PATH and tool versions IN THIS STEP ---"
        which clang && clang --version || exit 1
        which ld.lld && ld.lld --version || exit 1
        echo "--- Verification in Step 3 Complete ---"
        echo "Clang/LLVM toolchain ready."


    # Step 4: Configure (olddefconfig), Build Kernel, Modules, and DTBs
    - name: 🚀 Configure & Build Kernel, Modules, DTBs (Full LLVM, olddefconfig)
      working-directory: kernel_source # Run commands inside the kernel source directory
      run: |
        echo "Setting up build environment (Full LLVM Toolchain for Target and Host)..."
        # Define common tool variables for make commands
        TOOL_ARGS="ARCH=${{ env.ARCH }} LLVM=1 \
                   CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip READELF=llvm-readelf \
                   HOSTCC=clang HOSTLD=ld.lld"

        # --- CORRECTED: Define KCFLAGS, removing flags unknown to Clang 11 ---
        SUPPRESS_WARNINGS="-Wno-error=misleading-indentation \
        -Wno-error=address-of-packed-member \
        -Wno-error=address \
        -Wno-error=format \
        -Wno-error=format-extra-args \
        -Wno-error=sizeof-pointer-memaccess \
        -Wno-error=strict-prototypes \
        -Wno-error=unused-variable \
        -Wno-error=uninitialized \
        -Wno-error=pointer-to-int-cast"
        # Removed: -Wno-error=array-compare, -Wno-error=stringop-overread, -Wno-error=enum-int-mismatch, -Wno-error=memset-elt-size
        # --- END CORRECTION ---

        echo "Preparing kernel configuration using 'make olddefconfig'..."
        mkdir -p out

        # Locate Custom Config File
        CONFIG_SRC_PATH=$(find "$GITHUB_WORKSPACE/kernel_source" "$GITHUB_WORKSPACE" -maxdepth 1 -name "${{ env.CUSTOM_CONFIG_FILE }}" -print -quit)
        if [ -z "$CONFIG_SRC_PATH" ]; then
            echo "❌ Custom config file '${{ env.CUSTOM_CONFIG_FILE }}' not found!" ; exit 1
        fi
        echo "Found base config file at: ${CONFIG_SRC_PATH}"

        # Copy config to SOURCE dir temporarily for 'make olddefconfig'
        cp "${CONFIG_SRC_PATH}" .config
        echo "Copied base config to $(pwd)/.config"

        # Run make olddefconfig
        make $TOOL_ARGS O=out olddefconfig
        echo "Configuration updated with defaults (written to out/.config)."
        rm .config # Clean up temp config

        # Apply post-config modifications
        echo "Applying post-config modifications..."
        scripts/config --file out/.config --disable CONFIG_CC_STACKPROTECTOR || true
        scripts/config --file out/.config --disable CONFIG_CC_STACKPROTECTOR_STRONG || true
        scripts/config --file out/.config --disable WERROR || true
        scripts/config --file out/.config --disable KALLSYMS || true
        scripts/config --file out/.config --disable KALLSYMS_ALL || true

        # Get Kernel Release string
        echo "Getting Kernel Release string..."
        KERNEL_RELEASE=$(make $TOOL_ARGS O=out -s kernelrelease)
        echo "Kernel Release for modules: ${KERNEL_RELEASE}"
        if [ -z "${KERNEL_RELEASE}" ]; then echo "❌ Failed to get kernel release string!"; exit 1; fi

        # Pre-Make Debugging (Corrected)
        echo "--------------------------------------------------"
        echo "DEBUG: Verifying environment variables before make"
        echo "PATH: $PATH"
        echo -n "CC Version: "; clang --version || echo "Failed"
        echo -n "LD Version: "; ld.lld --version || echo "Failed"
        echo -n "HOSTCC Version: "; clang --version || echo "Failed" # HOSTCC is clang
        echo "--------------------------------------------------"

        # Build Kernel, Modules, DTBs (Using corrected KCFLAGS)
        echo "Starting kernel build (Image.gz + modules + dtbs) using $(nproc) threads (VERBOSE)..."
        make -j$(nproc) O=out V=1 $TOOL_ARGS KCFLAGS="$SUPPRESS_WARNINGS" Image.gz dtbs modules
        echo "Main build finished."

        # Install modules
        MODULES_STAGING_DIR="$(pwd)/modules_staging"
        echo "Installing kernel modules to staging directory: ${MODULES_STAGING_DIR}"
        make $TOOL_ARGS O=out modules_install INSTALL_MOD_PATH=../modules_staging
        echo "Modules installation finished."

        # Generate module dependencies
        echo "Generating module dependencies..."
        if command -v depmod &> /dev/null; then
            depmod -b "${MODULES_STAGING_DIR}" "${KERNEL_RELEASE}"
            echo "Module dependencies generated."
        else
            echo "⚠️ 'depmod' command not found."
        fi

        # Build Verification
        echo "Verifying build artifacts..."
        ls -l out/vmlinux || exit 1
        ls -l out/arch/${ARCH}/boot/Image.gz || exit 1
        ls -l out/arch/${ARCH}/boot/dts/${{ env.DTB_SUBPATH}}/*.dtb || exit 1
        MODULES_INSTALL_CHECK_PATH="${MODULES_STAGING_DIR}/lib/modules/${KERNEL_RELEASE}"
        if [ ! -d "${MODULES_INSTALL_CHECK_PATH}" ] || [ -z "$(ls -A ${MODULES_INSTALL_CHECK_PATH})" ]; then
            echo "⚠️ Modules directory empty/missing: ${MODULES_INSTALL_CHECK_PATH}. (May be ok if CONFIG_MODULES=n)."
        else
            echo "✅ Modules found in staging directory."
            ls -l "${MODULES_INSTALL_CHECK_PATH}/modules.dep" # Check if depmod ran
        fi
        echo "✅ Build verification passed (presence check)."

    # Step 5: Prepare Artifacts (Including Modules with dep files)
    - name: 📦 Prepare Artifacts (Inc. Modules, vmlinux - No Strip)
      run: |
        ARTIFACT_DIR="$GITHUB_WORKSPACE/artifact"
        MODULES_STAGING_DIR="$GITHUB_WORKSPACE/kernel_source/modules_staging"
        mkdir -p ${ARTIFACT_DIR}/modules
        echo "Preparing artifacts in ${ARTIFACT_DIR}..."
        cp kernel_source/out/arch/${{ env.ARCH }}/boot/Image.gz ${ARTIFACT_DIR}/ || echo "⚠️ Image.gz not found."
        cp kernel_source/out/vmlinux ${ARTIFACT_DIR}/ || echo "⚠️ vmlinux not found."
        cp kernel_source/out/arch/${{ env.ARCH }}/boot/dts/${{ env.DTB_SUBPATH }}/*.dtb ${ARTIFACT_DIR}/ 2>/dev/null || echo "⚠️ DTBs not found or dir empty."
        MODULES_INSTALL_LIB_PATH="${MODULES_STAGING_DIR}/lib/modules"
        if [ -d "${MODULES_INSTALL_LIB_PATH}" ] && [ -n "$(ls -A ${MODULES_INSTALL_LIB_PATH})" ]; then
            echo "Copying modules from ${MODULES_INSTALL_LIB_PATH}..."
            cp -r ${MODULES_INSTALL_LIB_PATH}/* ${ARTIFACT_DIR}/modules/
            echo "Copied modules."
        else
            echo "⚠️ No modules found in staging directory to copy."
        fi
        echo "Generating SHA256 hashes..."
        cd ${ARTIFACT_DIR} || exit 1
        sha256sum * > hashes.txt
        if [ -d "modules" ]; then find modules -type f -exec sha256sum {} + >> hashes.txt; fi
        cd ..
        echo "Hashes saved to artifact/hashes.txt"
        echo "Artifact preparation complete. Contents of ${ARTIFACT_DIR}:"
        ls -lRh ${ARTIFACT_DIR}

    # Step 6: Compress Artifacts into a single ZIP
    - name: 🗜️ Compress Artifacts
      if: success()
      run: |
        echo "Zipping artifacts..."
        ARTIFACT_DIR="$GITHUB_WORKSPACE/artifact"
        cd ${ARTIFACT_DIR}/..
        zip -r KernelArtifacts-${{ github.run_id }}.zip artifact
        echo "Artifacts zipped into KernelArtifacts-${{ github.run_id }}.zip"

    # Step 7: Upload Kernel Artifacts ZIP
    - name: 📤 Upload Kernel Artifacts ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Modules-vmlinux-DTB-Gzip-${{ github.run_id }}
        path: ${{ github.workspace }}/KernelArtifacts-${{ github.run_id }}.zip
        if-no-files-found: error
