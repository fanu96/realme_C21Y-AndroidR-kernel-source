# .github/workflows/build_kernel.yaml
# ----------------------------------------------------------------------------
# Minimal host tool versions required (from Documentation/process/changes.rst):
#   - GNU C (gcc) >= 3.2      (gcc --version)
#   - GNU make >= 3.81         (make --version)
#   - binutils >= 2.20         (ld -v)
#   - util‑linux >= 2.10o      (fdformat --version)
#   - kmod >= 13               (depmod -V)
#   - e2fsprogs >= 1.41.4      (e2fsck -V)
#   - squashfs-tools >= 4.0    (mksquashfs -version)
#   - openssl & libcrypto >= 1.0.0 (openssl version)
# ----------------------------------------------------------------------------
name: Build Kernel for Realme C21Y (RMX3261/RMX3263)

on:
  workflow_dispatch:

env:
  ARCH: arm64
  # Use standard GNU triple, aligns with Clang target and non-AOSP context
  CROSS_COMPILE: aarch64-linux-gnu-
  # Strip trace-printk calls for release builds
  STOP_SHIP_TRACEPRINTK: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📜 Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel_source

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio crossbuild-essential-arm64 \
            flex git kmod libelf-dev libncurses5-dev libssl-dev \
            lsb-release make python3 rsync wget zip unzip \
            libyaml-dev pkg-config

      - name: 📥 Download Clang Toolchain (crDroid r353983c / Clang 11.0.2)
        run: |
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6573524 clang
          # Prepend clang/bin (with clang, clang++, ld.lld, llvm-ar, etc.) to PATH
          echo "${{ github.workspace }}/clang/bin" >> $GITHUB_PATH
          clang --version

      - name: 🚀 Build Kernel (LLVM front-end + LLD linker)
        working-directory: kernel_source
        run: |
          set -euo pipefail

          #─── Basic environment ─────────────────────────────────────────────
          export ARCH=${{ env.ARCH }}
          export CROSS_COMPILE=${{ env.CROSS_COMPILE }}
          export KBUILD_BUILD_USER="GitHubActions"
          export KBUILD_BUILD_HOST="github.com"

          #─── Force LLVM for everything ─────────────────────────────────────
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export CC=clang
          export CXX=clang++
          export LD=ld.lld
          export HOSTCC=clang
          export HOSTCXX=clang++
          export HOSTLD=ld.lld
          export AR=llvm-ar
          export HOSTAR=llvm-ar
          export NM=llvm-nm
          export HOSTNM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export READELF=llvm-readelf
          export LLVM=1
          export LLVM_IAS=1
          # Note: export LDFLAGS="-fuse-ld=lld" likely redundant, removed for clarity

          #─── YAML libs for dtc ─────────────────────────────────────────────
          # Ensure absolute path for pkgconfig
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}"
          YAML_LIBS=$(pkg-config --libs yaml-0.1 2>/dev/null || echo "-lyaml -L/usr/lib/x86_64-linux-gnu")
          export HOST_LDFLAGS="$YAML_LIBS"

          #─── Prepare output & config ───────────────────────────────────────
          mkdir -p out
          cp stock_kernel.config out/.config

          #─── Update config with defaults non-interactively ────────────────
          # Make inherits exported vars (CC, LD, AR, NM, HOSTCC, HOSTLD, etc.)
          make O=out \
               ARCH=$ARCH \
               HOST_LDFLAGS="$HOST_LDFLAGS" \
               olddefconfig

          #─── Build Image + DTBs ───────────────────────────────────────────
          # Make inherits exported vars (CC, LD, AR, NM, HOSTCC, HOSTLD, etc.)
          make -j$(nproc) O=out V=1 \
               ARCH=$ARCH \
               HOST_LDFLAGS="$HOST_LDFLAGS" \
               STOP_SHIP_TRACEPRINTK=${{ env.STOP_SHIP_TRACEPRINTK }} \
               Image.gz dtbs
               # If vmlinux/System.map are needed, add vmlinux target here
               # and copy them in the next step.

          #─── Verify success ───────────────────────────────────────────────
          if [ ! -f out/arch/$ARCH/boot/Image.gz ]; then
            echo "❌ Build failed: Missing out/arch/$ARCH/boot/Image.gz"
            exit 1
          fi
          echo "✅ Kernel build successful!"

      - name: 📦 Prepare Artifact
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifact
          cp kernel_source/out/arch/${{ env.ARCH }}/boot/Image.gz $GITHUB_WORKSPACE/artifact/
          # If vmlinux/System.map were built, copy them here:
          # cp kernel_source/out/vmlinux $GITHUB_WORKSPACE/artifact/
          # cp kernel_source/out/System.map $GITHUB_WORKSPACE/artifact/
          find kernel_source/out/arch/${{ env.ARCH }}/boot/dts/ -name '*.dtb' -exec cp {} $GITHUB_WORKSPACE/artifact/ \;

      - name: 📤 Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.run_id }}
          path: ${{ github.workspace }}/artifact/*
          if-no-files-found: error
